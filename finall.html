<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentel Post Generator</title>
    <meta
      name="description"
      content="Create viral mental health social media posts for TikTok, Instagram and more."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Montserrat:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }

      :root {
        --accent: #2fbf71;
        --accent-dim: rgba(47, 191, 113, 0.12);
        --bg: #0a0a0a;
        --surface: #111111;
        --surface2: #1a1a1a;
        --surface3: #202020;
        --border: #2a2a2a;
        --text: #f0f0f0;
        --text2: #555;
        --text3: #888;
        --input-bg: #0e0e0e;
        --shadow: rgba(0, 0, 0, 0.9);
        --canvas-bg: #070707;
        --danger: #e63946;
        --radius: 7px;
        --pub-bg: #0a140e;
        --pub-border: #1a3322;
      }
      [data-theme="light"] {
        --accent: #18a350;
        --accent-dim: rgba(24, 163, 80, 0.1);
        --bg: #efefed;
        --surface: #ffffff;
        --surface2: #f4f4f2;
        --surface3: #ebebea;
        --border: #e0e0dc;
        --text: #111;
        --text2: #bbb;
        --text3: #888;
        --input-bg: #fafaf8;
        --shadow: rgba(0, 0, 0, 0.1);
        --canvas-bg: #ddddd8;
        --danger: #e63946;
        --pub-bg: #f0fdf5;
        --pub-border: #bbf7d0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
        transition:
          background 0.2s,
          color 0.2s;
      }

      /* ── TOPBAR ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        height: 46px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
        z-index: 10;
      }
      .topbar-logo {
        font-family: "Fraunces", serif;
        font-size: 19px;
        font-weight: 700;
        color: var(--accent);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 1px;
        letter-spacing: -0.5px;
      }
      .topbar-logo span {
        color: var(--text);
      }
      .topbar-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text2);
        flex: 1;
        font-family: "DM Mono", monospace;
      }
      .topbar-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 13px;
        cursor: pointer;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--text3);
        text-transform: uppercase;
        transition: all 0.2s;
        font-family: "Syne", sans-serif;
      }
      .topbar-pill:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── LAYOUT ── */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 46px);
      }

      /* ── PREVIEW PANE ── */
      .preview-pane {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 14px 14px 10px;
        gap: 10px;
        background: var(--canvas-bg);
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }
      .size-tabs {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
        flex-shrink: 0;
      }
      .size-tab {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text2);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 5px 10px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: "Syne", sans-serif;
      }
      .size-tab.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      .slide-nav {
        display: none;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .slide-nav.on {
        display: flex;
      }
      .nav-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text3);
        font-size: 14px;
        padding: 4px 13px;
        cursor: pointer;
        transition: all 0.15s;
        line-height: 1;
        font-family: "Syne", sans-serif;
      }
      .nav-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .slide-counter {
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        min-width: 44px;
        text-align: center;
        font-family: "DM Mono", monospace;
      }
      .canvas-wrap {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
        overflow: hidden;
      }
      #preview-canvas {
        border-radius: 6px;
        display: block;
        box-shadow: 0 8px 48px var(--shadow);
        cursor: default;
        user-select: none;
        max-width: 100%;
        max-height: 100%;
      }
      #preview-canvas.draggable {
        cursor: grab;
      }
      #preview-canvas.dragging {
        cursor: grabbing;
      }
      .preview-note {
        font-size: 9px;
        color: var(--text2);
        letter-spacing: 1px;
        text-transform: uppercase;
        flex-shrink: 0;
        font-family: "DM Mono", monospace;
      }

      /* ── CONTROLS PANE ── */
      .controls-pane {
        width: 330px;
        flex-shrink: 0;
        overflow-y: auto;
        overflow-x: hidden;
        border-left: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .controls-pane::-webkit-scrollbar {
        width: 3px;
      }
      .controls-pane::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* ── STYLE SWITCHER ── */
      .style-switcher {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .style-switcher::-webkit-scrollbar {
        display: none;
      }
      .style-btn {
        flex: 1;
        min-width: 58px;
        padding: 9px 4px;
        cursor: pointer;
        text-align: center;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text3);
        border-right: 1px solid var(--border);
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        position: relative;
        white-space: nowrap;
      }
      .style-btn:last-child {
        border-right: none;
      }
      .style-btn.active {
        color: var(--accent);
        background: var(--accent-dim);
      }
      .style-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
      }
      .style-btn-icon {
        font-size: 15px;
        display: block;
        margin-bottom: 3px;
      }

      .style-indicator {
        padding: 8px 15px 2px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        font-family: "DM Mono", monospace;
      }
      .style-desc {
        padding: 2px 15px 10px;
        font-size: 10px;
        color: var(--text3);
        line-height: 1.5;
        border-bottom: 1px solid var(--border);
      }

      /* ── PANEL SECTIONS ── */
      .panel-section {
        border-bottom: 1px solid var(--border);
      }
      .sec-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 15px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }
      .sec-hdr:hover {
        background: var(--surface2);
      }
      .sec-title {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        font-family: "DM Mono", monospace;
      }
      .sec-arrow {
        font-size: 8px;
        color: var(--text2);
        transition: transform 0.2s;
      }
      .panel-section.collapsed .sec-arrow {
        transform: rotate(-90deg);
      }
      .sec-body {
        padding: 12px 15px 15px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .panel-section.collapsed .sec-body {
        display: none;
      }

      /* ── PUBLISH PANEL ── */
      .publish-panel {
        background: var(--pub-bg);
      }
      .publish-panel .sec-hdr {
        border-bottom: 1px solid var(--pub-border);
      }
      .publish-panel .sec-title {
        color: var(--accent);
        font-size: 10px;
        letter-spacing: 2.5px;
      }
      .pub-step-label {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: "DM Mono", monospace;
      }
      .pub-step-num {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 9px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .pub-divider {
        height: 1px;
        background: var(--pub-border);
        margin: 2px 0;
      }
      .platform-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .platform-card {
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 10px 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        background: var(--input-bg);
        position: relative;
      }
      .platform-card:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
        transform: translateY(-1px);
      }
      .platform-card.selected {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .pc-icon {
        font-size: 20px;
        margin-bottom: 3px;
      }
      .pc-name {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text);
      }
      .pc-desc {
        font-size: 8px;
        color: var(--text3);
        margin-top: 2px;
      }
      .pc-check {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 8px;
        font-weight: 900;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .platform-card.selected .pc-check {
        display: flex;
      }
      .pub-progress-wrap {
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      .pub-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #1aff88);
        width: 0%;
        transition: width 0.3s;
      }
      .pub-status {
        font-size: 10px;
        color: var(--text3);
        text-align: center;
        min-height: 16px;
        line-height: 1.5;
        font-family: "DM Mono", monospace;
      }
      .pub-status.success {
        color: var(--accent);
        font-weight: 700;
      }
      .pub-status.error {
        color: var(--danger);
      }
      .publish-btn-main {
        background: var(--accent);
        border: none;
        border-radius: 9px;
        color: #000;
        font-family: "Syne", sans-serif;
        font-weight: 900;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 13px;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 16px rgba(47, 191, 113, 0.25);
      }
      .publish-btn-main:hover {
        opacity: 0.88;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(47, 191, 113, 0.35);
      }
      .publish-btn-main:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* Link box */
      .link-box {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: var(--surface2);
        border: 1px solid var(--pub-border);
        border-radius: 9px;
      }
      .link-box.visible {
        display: flex;
      }
      .link-box-title {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        font-family: "DM Mono", monospace;
      }
      .link-url {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 10px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        word-break: break-all;
        line-height: 1.5;
      }
      .link-actions {
        display: flex;
        gap: 5px;
      }
      .link-btn {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 5px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .link-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .link-btn.accent-bg {
        background: var(--accent);
        color: #000;
        border-color: var(--accent);
      }
      .link-btn.accent-bg:hover {
        opacity: 0.85;
      }
      .link-expiry {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        font-family: "DM Mono", monospace;
      }

      /* Platform open buttons */
      .platform-open-btns {
        display: none;
        flex-direction: column;
        gap: 5px;
      }
      .platform-open-btns.visible {
        display: flex;
      }
      .plat-open-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid var(--border);
        text-decoration: none;
      }
      .plat-open-btn:hover {
        transform: translateX(2px);
      }
      .plat-open-btn.tiktok {
        background: #010101;
        border-color: #333;
      }
      .plat-open-btn.tiktok:hover {
        border-color: #69c9d0;
      }
      .plat-open-btn.instagram {
        background: linear-gradient(
          135deg,
          #833ab4 0%,
          #fd1d1d 50%,
          #fcb045 100%
        );
        border-color: transparent;
      }
      .plat-open-btn.twitter {
        background: #000;
        border-color: #333;
      }
      .plat-open-btn.twitter:hover {
        border-color: #1d9bf0;
      }
      .plat-open-icon {
        font-size: 18px;
        flex-shrink: 0;
      }
      .plat-open-text {
        flex: 1;
      }
      .plat-open-name {
        font-size: 11px;
        font-weight: 800;
        color: #fff;
      }
      .plat-open-sub {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 1px;
      }
      .plat-open-arrow {
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
      }

      /* TikTok Modal */
      .tt-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      .tt-modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 480px;
        padding: 20px 20px 32px;
        position: relative;
        animation: slideUp 0.25s ease;
      }
      @keyframes slideUp {
        from {
          transform: translateY(40px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .tt-modal-close {
        position: absolute;
        top: 14px;
        right: 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 12px;
        color: var(--text3);
        transition: all 0.15s;
      }
      .tt-modal-close:hover {
        border-color: var(--danger);
        color: var(--danger);
      }
      .tt-modal-title {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 4px;
        padding-right: 32px;
      }
      .tt-modal-sub {
        font-size: 10px;
        color: var(--text3);
        margin-bottom: 16px;
        line-height: 1.55;
      }
      .tt-steps {
        display: flex;
        flex-direction: column;
        gap: 9px;
        margin-bottom: 16px;
      }
      .tt-step {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        background: var(--surface2);
        border-radius: 8px;
        padding: 10px 12px;
        border: 1px solid var(--border);
      }
      .tt-step-num {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 9px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .tt-step-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 2px;
      }
      .tt-step-desc {
        font-size: 10px;
        color: var(--text2);
        line-height: 1.5;
      }
      .tt-modal-actions {
        display: flex;
        gap: 8px;
      }
      .tt-action-btn {
        flex: 1;
        padding: 11px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: none;
      }
      .tt-action-primary {
        background: #010101;
        color: #69c9d0;
        border: 1px solid #333;
      }
      .tt-action-primary:hover {
        background: #111;
        border-color: #69c9d0;
      }
      .tt-action-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .tt-action-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── FORM ELEMENTS ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text2);
        display: block;
        font-family: "DM Mono", monospace;
      }
      textarea,
      input[type="text"],
      input[type="number"] {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-weight: 400;
        font-size: 13px;
        padding: 8px 11px;
        outline: none;
        transition: border-color 0.2s;
        resize: none;
        line-height: 1.5;
      }
      textarea {
        min-height: 64px;
        resize: vertical;
      }
      textarea:focus,
      input[type="text"]:focus,
      input[type="number"]:focus {
        border-color: var(--accent);
      }
      input[type="color"] {
        width: 34px;
        height: 30px;
        padding: 2px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--input-bg);
        cursor: pointer;
        outline: none;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
        border-radius: 5px;
      }
      input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 5px;
      }

      .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .g3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
      }

      .range-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--surface);
      }
      .range-val {
        font-size: 10px;
        color: var(--accent);
        font-weight: 700;
        min-width: 30px;
        text-align: right;
        font-family: "DM Mono", monospace;
      }

      /* ── BUTTONS ── */
      .btn-row {
        display: flex;
        gap: 5px;
      }
      .tbtn {
        flex: 1;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 4px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        letter-spacing: 0.3px;
        line-height: 1.3;
        font-family: "Syne", sans-serif;
      }
      .tbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .tbtn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .btn-primary {
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #000;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 12px;
        cursor: pointer;
        transition: opacity 0.2s;
        width: 100%;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 10px;
        padding: 9px 12px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text2);
        font-size: 10px;
        font-weight: 600;
        padding: 7px 10px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        font-family: "Syne", sans-serif;
      }
      .btn-ghost:hover {
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn-ghost-add {
        background: transparent;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 10px;
        font-weight: 600;
        padding: 8px 10px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        text-align: center;
        font-family: "Syne", sans-serif;
      }
      .btn-ghost-add:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── UPLOAD ZONE ── */
      .upload-zone {
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        padding: 11px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        position: relative;
      }
      .upload-zone:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .upload-zone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .upload-zone-text {
        font-size: 10px;
        color: var(--text3);
        line-height: 1.6;
      }

      /* ── SWATCHES ── */
      .swatches {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        align-items: center;
      }
      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
      }
      .swatch:hover {
        transform: scale(1.18);
      }
      .swatch.on {
        border-color: var(--text);
      }
      .txt-color-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .txt-swatch {
        width: 24px;
        height: 24px;
        border-radius: 5px;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
      }
      .txt-swatch:hover {
        transform: scale(1.15);
      }
      .txt-swatch.on {
        border-color: var(--accent);
      }

      /* ── MISC UI ── */
      .hint {
        font-size: 10px;
        color: var(--text3);
        line-height: 1.6;
        padding: 8px 10px;
        background: var(--surface2);
        border-radius: 6px;
        border-left: 2px solid var(--border);
      }
      .hint.accent {
        border-left-color: var(--accent);
        color: var(--accent);
      }
      .accent-note {
        font-size: 10px;
        color: var(--accent);
        font-weight: 600;
        line-height: 1.4;
      }
      .prog-wrap {
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      .prog-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.4s;
      }
      .status-text {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        min-height: 14px;
        line-height: 1.5;
        font-family: "DM Mono", monospace;
      }

      .handle-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .handle-prefix {
        position: absolute;
        left: 11px;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        pointer-events: none;
        z-index: 1;
      }
      .handle-wrap input {
        padding-left: 22px;
      }

      /* ── SLIDE LIST ── */
      .slide-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .slide-row {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 7px 10px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .slide-row:hover {
        border-color: var(--text3);
      }
      .slide-row.on {
        border-color: var(--accent);
      }
      .slide-num-badge {
        font-size: 10px;
        font-weight: 800;
        color: var(--accent);
        min-width: 14px;
        font-family: "DM Mono", monospace;
      }
      .slide-mini {
        width: 30px;
        height: 30px;
        border-radius: 4px;
        background: var(--border);
        flex-shrink: 0;
        overflow: hidden;
      }
      .slide-mini canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .slide-txt {
        flex: 1;
        font-size: 10px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .slide-del {
        font-size: 11px;
        color: var(--text2);
        cursor: pointer;
        padding: 3px 6px;
        border-radius: 4px;
        transition: color 0.15s;
      }
      .slide-del:hover {
        color: var(--danger);
      }

      /* ── EXPORT ── */
      .exp-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .exp-item {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .exp-item:hover {
        border-color: var(--accent);
      }
      .exp-item.on {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .exp-name {
        font-size: 10px;
        font-weight: 700;
        color: var(--text);
      }
      .exp-size {
        font-size: 8px;
        color: var(--text3);
        margin-top: 1px;
        font-family: "DM Mono", monospace;
      }
      .exp-ratio {
        font-size: 8px;
        color: var(--accent);
        font-weight: 700;
        margin-top: 2px;
      }

      /* ── CAPTION / PROMPT BOXES ── */
      .caption-box {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.7;
        white-space: pre-wrap;
        max-height: 160px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .prompt-box {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
        font-size: 10px;
        color: var(--text3);
        line-height: 1.7;
        white-space: pre-wrap;
        max-height: 220px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .caption-actions {
        display: flex;
        gap: 5px;
        margin-top: 6px;
      }
      .caption-btn {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 10px;
        font-weight: 700;
        padding: 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .caption-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .caption-btn.copied {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── TOPIC CHIPS ── */
      .prompt-topic-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .topic-chip {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        white-space: nowrap;
      }
      .topic-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .topic-chip.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── PLATFORM / CTA ── */
      .plat-wrap {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .plat-btn {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 5px 9px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: "Syne", sans-serif;
      }
      .plat-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .plat-btn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .cta-type-wrap {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .cta-tbtn {
        flex: 1;
        min-width: 46px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 4px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        line-height: 1.4;
        font-family: "Syne", sans-serif;
      }
      .cta-tbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .cta-tbtn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── CUSTOM SIZE ── */
      .custom-size-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .custom-size-row input {
        flex: 1;
        text-align: center;
      }
      .custom-size-sep {
        font-size: 14px;
        color: var(--text2);
        font-weight: 700;
        flex-shrink: 0;
      }

      /* ── PRESETS ── */
      .preset-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .preset-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .preset-item:hover {
        border-color: var(--accent);
      }
      .preset-item-name {
        flex: 1;
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
      }
      .preset-item-date {
        font-size: 9px;
        color: var(--text2);
        font-family: "DM Mono", monospace;
      }
      .preset-item-del {
        font-size: 11px;
        color: var(--text2);
        cursor: pointer;
        padding: 3px 5px;
        border-radius: 4px;
        transition: color 0.15s;
      }
      .preset-item-del:hover {
        color: var(--danger);
      }

      /* pub caption */
      .pub-caption-preview {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px;
        font-size: 10px;
        color: var(--text);
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 90px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .pub-copy-btn {
        background: var(--surface3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 6px 9px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        white-space: nowrap;
      }
      .pub-copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pub-copy-btn.done {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .zip-info {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        line-height: 1.7;
        padding: 2px 0;
        font-family: "DM Mono", monospace;
      }

      /* ── TYPOGRAPHY CONTROLS ── */
      .typo-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .typo-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .typo-lbl {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text2);
        font-family: "DM Mono", monospace;
        min-width: 60px;
        flex-shrink: 0;
      }
      .typo-val {
        font-size: 9px;
        color: var(--accent);
        font-weight: 700;
        min-width: 34px;
        text-align: right;
        font-family: "DM Mono", monospace;
      }
      .typo-row input[type="range"] {
        flex: 1;
      }
      .typo-reset {
        font-size: 9px;
        color: var(--text2);
        cursor: pointer;
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        flex-shrink: 0;
      }
      .typo-reset:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .typo-master {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 4px;
      }
      .typo-master .typo-lbl {
        color: var(--text);
        font-size: 10px;
      }
      .typo-divider {
        height: 1px;
        background: var(--border);
        margin: 4px 0;
      }
      .typo-sublabel {
        font-size: 8px;
        color: var(--text2);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "DM Mono", monospace;
        margin-bottom: 2px;
      }

      /* ── OVERLAY / SHAPES ── */
      .overlay-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }
      .overlay-btn {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 3px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .overlay-btn:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .overlay-btn.on {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .overlay-btn-icon {
        font-size: 13px;
        display: block;
        margin-bottom: 2px;
        color: var(--text);
      }
      .overlay-btn-lbl {
        font-size: 7.5px;
        color: var(--text3);
        font-weight: 700;
        letter-spacing: 0.3px;
        line-height: 1.2;
      }
      .overlay-enabled-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .toggle-switch input {
        display: none;
      }
      .toggle-track {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 10px;
        transition: background 0.2s;
      }
      .toggle-switch input:checked + .toggle-track {
        background: var(--accent);
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle-switch input:checked ~ .toggle-thumb {
        transform: translateX(16px);
      }
      .overlay-color-row {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-wrap: wrap;
      }
      .overlay-clr-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
      }
      .overlay-clr-btn:hover {
        transform: scale(1.15);
      }
      .overlay-clr-btn.on {
        border-color: var(--text);
      }

      /* ── PROMPT ENGINE UI ── */
      .prompt-box {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px;
        font-size: 10px;
        color: var(--text3);
        line-height: 1.75;
        white-space: pre-wrap;
        max-height: 260px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .hook-score-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        flex: 1;
      }
      .hook-score-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .score-grade {
        font-size: 28px;
        font-weight: 900;
        font-family: "DM Mono", monospace;
        line-height: 1;
      }

      /* ── ACCESSIBILITY PANEL ── */
      .a11y-score {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 7px 10px;
        border-radius: 6px;
        margin-bottom: 8px;
        text-align: center;
        font-family: "DM Mono", monospace;
      }
      .a11y-score-pass {
        background: rgba(47, 191, 113, 0.12);
        color: var(--accent);
        border: 1px solid rgba(47, 191, 113, 0.3);
      }
      .a11y-score-warn {
        background: rgba(230, 180, 0, 0.1);
        color: #e6b400;
        border: 1px solid rgba(230, 180, 0, 0.3);
      }
      .a11y-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 7px;
        margin-bottom: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
      }
      .a11y-pass {
        border-color: rgba(47, 191, 113, 0.35);
      }
      .a11y-warn {
        border-color: rgba(230, 180, 0, 0.35);
      }
      .a11y-fail {
        border-color: rgba(230, 57, 70, 0.45);
      }
      .a11y-badge {
        width: 22px;
        height: 22px;

        const identityScore =
          identityCount >= 2 ? 14 : identityCount === 1 ? 9 : 3;
        breakdown.push({
          factor: "Identity Resonance",
          score: identityScore,
          desc: HOOK_SCORE_FACTORS.identityResonance.desc,
        });
        total += identityScore;

        // Score: curiosity gap
        const hasGap = GAP_WORDS.some((w) => text.includes(w));
        const gapScore = hasGap
          ? HOOK_SCORE_FACTORS.curiosityGap.weight
          : Math.round(HOOK_SCORE_FACTORS.curiosityGap.weight * 0.4);
        breakdown.push({
          factor: "Curiosity Gap",
          score: gapScore,
          desc: HOOK_SCORE_FACTORS.curiosityGap.desc,
        });
        total += gapScore;

        // Score: emotional compression (length vs punch estimate)
        const avgWordLen =
          hookText.replace(/\s/g, "").length / Math.max(words.length, 1);
        const compression = avgWordLen >= 5.5 ? 15 : avgWordLen >= 4.5 ? 11 : 7;
        breakdown.push({
          factor: "Emotional Compression",
          score: compression,
          desc: HOOK_SCORE_FACTORS.emotionalCompression.desc,
        });
        total += compression;

        const maxTotal = Object.values(HOOK_SCORE_FACTORS).reduce(
          (a, b) => a + b.weight,
          0,
        );
        const percent = Math.round((total / maxTotal) * 100);
        const grade =
          percent >= 85
            ? "A+"
            : percent >= 75
              ? "A"
              : percent >= 65
                ? "B"
                : percent >= 55
                  ? "C"
                  : percent >= 40
                    ? "D"
                    : "F";

        return { score: percent, breakdown, grade, total, maxTotal };

      function drawDecorativeOverlay(ctx, W, H, acc) {
        const ov = state.overlay;

        const op = (ov.opacity || 40) / 100;
        const clr =
          ov.color === "accent"
            ? acc
            : ov.color === "white"
              ? "#ffffff"
              : ov.color === "black"
                ? "#000000"
                : ov.customColor || "#ffffff";

        const { r, g, b } = hexToRgb(clr);

          ctx.strokeStyle = rgba(0.45);
          ctx.lineWidth = Math.round(1 * fS);

            ctx.moveTo(i, 0);
            ctx.lineTo(i + H, H);

            [
              [0.15, 0.05],
              [0.15, 0.35],
              [0.55, 0.35],
            ],
            [
              [0.8, 0.55],
              [0.8, 0.9],
              [0.45, 0.9],
              [0.45, 0.7],
            ],
          ];
          pts.forEach((path) => {
            ctx.beginPath();
            path.forEach(([px, py], i) =>
              i === 0 ? ctx.moveTo(px * W, py * H) : ctx.lineTo(px * W, py * H),
            );
            ctx.stroke();
            // Node dots
            path.forEach(([px, py]) => {
              ctx.beginPath();
              ctx.arc(px * W, py * H, Math.round(4 * fS), 0, Math.PI * 2);
              ctx.fill();
            });
          });
        }

        ctx.restore();
      }

      function drawCard(canvas, W, H, s) {
        const ctx = canvas.getContext("2d");
        canvas.width = W;
        canvas.height = H;
        if (state.currentStyle === "bold") drawBold(ctx, W, H, s);
        else if (state.currentStyle === "editorial")
          drawEditorial(ctx, W, H, s);
        else if (state.currentStyle === "quote") drawQuote(ctx, W, H, s);
        else if (state.currentStyle === "listicle") drawListicle(ctx, W, H, s);
        else if (state.currentStyle === "minimal") drawMinimal(ctx, W, H, s);
      }

      // ═══════════════════════════════════════════════════════════════
      // SIDEBAR — helpers
      // ═══════════════════════════════════════════════════════════════
      // ═══════════════════════════════════════════════════════════════
      // ACCESSIBILITY ENGINE
      // ═══════════════════════════════════════════════════════════════

      // Parse any CSS color string to {r,g,b,a}
      function parseColor(str) {
        if (!str) return null;
        str = str.trim();
        if (str === "accent") str = state.accentColor;
        // Hex
        if (str.startsWith("#")) {
          const h = str.slice(1);
          if (h.length === 3)
            return {
              r: parseInt(h[0] + h[0], 16),
              g: parseInt(h[1] + h[1], 16),
              b: parseInt(h[2] + h[2], 16),
              a: 1,
            };
          if (h.length === 6)
            return {
              r: parseInt(h.slice(0, 2), 16),
              g: parseInt(h.slice(2, 4), 16),
              b: parseInt(h.slice(4, 6), 16),
              a: 1,
            };
        }
        // rgba/rgb
        const m = str.match(
          /rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/,
        );
        if (m)
          return {
            r: +m[1],
            g: +m[2],
            b: +m[3],
            a: m[4] !== undefined ? +m[4] : 1,
          };
        // Named
        const names = {
          white: { r: 255, g: 255, b: 255, a: 1 },
          black: { r: 0, g: 0, b: 0, a: 1 },
          "#000000": { r: 0, g: 0, b: 0, a: 1 },
          "#ffffff": { r: 255, g: 255, b: 255, a: 1 },
        };
        return names[str] || null;
      }

      // Relative luminance (WCAG 2.1)
      function relativeLuminance(r, g, b) {
        const [rs, gs, bs] = [r, g, b].map((v) => {
          const s = v / 255;
          return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
      }

      // WCAG contrast ratio
      function contrastRatio(c1, c2) {
        if (!c1 || !c2) return 1;
        const L1 = relativeLuminance(c1.r, c1.g, c1.b);
        const L2 = relativeLuminance(c2.r, c2.g, c2.b);
        const lighter = Math.max(L1, L2),
          darker = Math.min(L1, L2);
        return (lighter + 0.05) / (darker + 0.05);
      }

      // Blend foreground onto background (considering photo overlay)
      function effectiveBackground(hasBgPhoto, bgColor, overlayDarkness) {
        if (hasBgPhoto) {
          // Approximation: photo avg ~35% luminance with overlay applied
          const d = overlayDarkness || 0.65;
          const v = Math.round(255 * 0.35 * (1 - d));
          return { r: v, g: v, b: v, a: 1 };
        }
        return parseColor(bgColor) || { r: 0, g: 0, b: 0, a: 1 };
      }

      // Blend overlay color on top of background (simplified alpha blend)
      function blendOnBg(fg, bg, alpha) {
        return {
          r: Math.round(fg.r * alpha + bg.r * (1 - alpha)),
          g: Math.round(fg.g * alpha + bg.g * (1 - alpha)),
          b: Math.round(fg.b * alpha + bg.b * (1 - alpha)),
          a: 1,
        };
      }

      // Suggest corrected text color for minimum contrast
      function suggestTextColor(bgColor, minRatio) {
        const bg = parseColor(bgColor) || { r: 0, g: 0, b: 0, a: 1 };
        const white = { r: 255, g: 255, b: 255 };
        const black = { r: 0, g: 0, b: 0 };
        const rW = contrastRatio(white, bg);
        const rB = contrastRatio(black, bg);
        if (rW >= minRatio) return "#ffffff";
        if (rB >= minRatio) return "#000000";
        // Neither pure white/black meets minimum — return whichever is better
        return rW > rB ? "#ffffff" : "#000000";
      }

      // Run full accessibility audit and return results
      function runA11yAudit() {
        const hasBgPhoto = !!getSlide().bgImg;
        const solidColor =
          document.getElementById("bg-solid-color")?.value || "#000000";
        const darkness =
          parseInt(document.getElementById("darkness")?.value || "65") / 100;

        const bg = effectiveBackground(hasBgPhoto, solidColor, darkness);
        const textC = parseColor(
          state.textColor === "accent" ? state.accentColor : state.textColor,
        ) || { r: 255, g: 255, b: 255 };
        const accC = parseColor(state.accentColor) || { r: 47, g: 191, b: 113 };
        const white = { r: 255, g: 255, b: 255 };
        const black = { r: 0, g: 0, b: 0 };

        // Overlay color (if enabled)
        let ovColorResolved = null;
        if (state.overlay.enabled && state.overlay.preset !== "none") {
          const ovClrStr =
            state.overlay.color === "accent"
              ? state.accentColor
              : state.overlay.color === "white"
                ? "#ffffff"
                : state.overlay.color === "black"
                  ? "#000000"
                  : state.overlay.customColor || "#ffffff";
          ovColorResolved = parseColor(ovClrStr);
        }

        const checks = [];

        // 1. Headline text on background
        const headRatio = contrastRatio(textC, bg);
        checks.push({
          id: "headline",
          label: "Headline text",
          ratio: headRatio,
          aa: headRatio >= 4.5,
          aaa: headRatio >= 7,
          fg: textC,
          bg,
          suggestion:
            headRatio < 4.5
              ? suggestTextColor(
                  state.textColor === "accent"
                    ? state.accentColor
                    : state.textColor,
                  4.5,
                )
              : null,
        });

        // 2. Accent (tag, CTA, handle) on background
        const accRatio = contrastRatio(accC, bg);
        checks.push({
          id: "accent",
          label: "Accent / Tag text",
          ratio: accRatio,
          aa: accRatio >= 4.5,
          aaa: accRatio >= 7,
          fg: accC,
          bg,
          suggestion: accRatio < 4.5 ? null : null, // accent is design choice
        });

        // 3. Overlay vs text (if overlay enabled)
        if (ovColorResolved) {
          const ovAlpha = (state.overlay.opacity || 40) / 100;
          const blendedOv = blendOnBg(ovColorResolved, bg, ovAlpha);
          const ovVsText = contrastRatio(textC, blendedOv);
          checks.push({
            id: "overlay",
            label: "Text over overlay",
            ratio: ovVsText,
            aa: ovVsText >= 4.5,
            aaa: ovVsText >= 7,
            fg: textC,
            bg: blendedOv,
            suggestion:
              ovVsText < 4.5
                ? "Reduce overlay opacity or change overlay color"
                : null,
          });
        }

        // 4. White text on bg (brand bar area is often brighter)
        const brandTextRatio = contrastRatio(white, bg);
        checks.push({
          id: "brand",
          label: "Brand / Handle text",
          ratio: brandTextRatio,
          aa: brandTextRatio >= 4.5,
          aaa: brandTextRatio >= 7,
          fg: white,
          bg,
        });

        return checks;
      }

      // Luminance-based suggestion for overlay opacity that maintains AA for text
      function suggestOverlayOpacity(
        textColor,
        bgColor,
        overlayColor,
        minRatio,
      ) {
        const fg = parseColor(
          textColor === "accent" ? state.accentColor : textColor,
        ) || { r: 255, g: 255, b: 255 };
        const bg = parseColor(bgColor) || { r: 0, g: 0, b: 0 };
        const ov = parseColor(overlayColor) || { r: 255, g: 255, b: 255 };
        // Binary search for max opacity where text still passes
        let lo = 0,
          hi = 100;
        for (let i = 0; i < 15; i++) {
          const mid = (lo + hi) / 2;
          const blended = blendOnBg(ov, bg, mid / 100);
          contrastRatio(fg, blended) >= minRatio ? (lo = mid) : (hi = mid);
        }
        return Math.round(lo);
      }

      // Auto-fix accessibility issues
      function autoFixA11y() {
        const checks = runA11yAudit();
        let fixed = [];

        checks.forEach((ch) => {
          if (!ch.aa) {
            if (ch.id === "headline" && ch.suggestion) {
              state.textColor = ch.suggestion;
              // Update swatch UI
              document
                .querySelectorAll(".txt-swatch")
                .forEach((s) => s.classList.remove("on"));
              fixed.push("Headline text → " + ch.suggestion);
            }
            if (ch.id === "overlay") {
              // Reduce overlay opacity until text passes
              const ovClrStr =
                state.overlay.color === "accent"
                  ? state.accentColor
                  : state.overlay.color === "white"
                    ? "#ffffff"
                    : state.overlay.color === "black"
                      ? "#000000"
                      : state.overlay.customColor || "#ffffff";
              const bgColor =
                document.getElementById("bg-solid-color")?.value || "#000000";
              const safeOp = suggestOverlayOpacity(
                state.textColor,
                bgColor,
                ovClrStr,
                4.5,
              );
              if (safeOp < (state.overlay.opacity || 40)) {
                state.overlay.opacity = Math.max(5, safeOp);
                const opEl = document.getElementById("overlay-opacity");
                if (opEl) opEl.value = state.overlay.opacity;
                const opVEl = document.getElementById("overlay-opacity-val");
                if (opVEl) opVEl.textContent = state.overlay.opacity;
                fixed.push(
                  `Overlay opacity → ${state.overlay.opacity}% (text now passes AA)`,
                );
              }
            }
          }
        });

        redrawFn();
        renderA11yPanel();
        return fixed;
      }

        });
        if (inner !== "") e.innerHTML = inner;
        return e;

        if (id === "all") {
          if (pubPlatforms.size === 4) {
            pubPlatforms.clear();

              .querySelectorAll(".platform-card")
              .forEach((c) => c.classList.remove("selected"));

            document
              .querySelectorAll(".platform-card")
              .forEach((c) => c.classList.add("selected"));

          return;

        if (pubPlatforms.has(id)) {
          pubPlatforms.delete(id);
          el.classList.remove("selected");

          pubPlatforms.add(id);
          el.classList.add("selected");

      }

      function buildCapText(tone) {
        const hl = document.getElementById("txt")?.value?.trim() || "";
        const tag = document.getElementById("tag")?.value?.trim() || "";
        const m = PLATFORM_META[state.platform];
        const handle =
          state.platform !== "none" && m.handle
            ? `${m.prefix}${m.handle}`
            : "Mentel";
        const tags = [...MH_HASHTAGS]
          .sort(() => Math.random() - 0.5)
          .slice(0, 9)
          .join(" ");
        if (tone === "tiktok")
          return `${hl}\n\n${tag ? tag + " | " : ""}Drop a ✅ if this hits!\n\n👉 Follow ${handle} for more\n\n${tags}`;
        if (tone === "ig")
          return `💭 ${hl}\n\n${tag ? "[" + tag + "]\n\n" : ""}Save this post — someone you know needs to see it.\n\nFollow ${handle} for daily mental health insights.\n\n.\n.\n.\n${tags}`;
        const short = hl.length > 200 ? hl.slice(0, 197) + "…" : hl;
        return `${short}\n\n${tags.split(" ").slice(0, 5).join(" ")}`;
      }
      function pubGenerateCaption() {
        pubCaptionText = buildCapText(pubTone);
        const el = document.getElementById("pub-caption-preview");

      function pubCopyCaption() {

      function getPlatformSizes() {
        const s = [],
          all = pubPlatforms.has("all");
        if (all || pubPlatforms.has("tiktok")) {
          s.push({ w: 1080, h: 1350, lbl: "TikTok-Normal-4x5" });
          s.push({ w: 1080, h: 1920, lbl: "TikTok-Full-9x16" });
        }
        if (all || pubPlatforms.has("instagram")) {
          s.push({ w: 1080, h: 1920, lbl: "IG-Story-9x16" });
          s.push({ w: 1080, h: 1080, lbl: "IG-Square-1x1" });
          s.push({ w: 1080, h: 1350, lbl: "IG-Portrait-4x5" });
        }
        if (all || pubPlatforms.has("twitter"))
          s.push({ w: 1080, h: 1080, lbl: "Twitter-Square-1x1" });
        const seen = new Set();
        return s.filter((x) => {
          if (seen.has(x.lbl)) return false;
          seen.add(x.lbl);
          return true;
        });
      }

      async function publishAll() {
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";
        pubGenerateCaption();
        const btn = document.getElementById("pub-main-btn"),
          statusEl = document.getElementById("pub-status");
        const pw = document.getElementById("pub-pw"),
          pf = document.getElementById("pub-pf");
        btn.disabled = true;
        document.getElementById("pub-btn-text").textContent = "Rendering…";
        document.getElementById("pub-btn-icon").textContent = "⏳";
        pw.style.display = "block";
        statusEl.textContent = "Generating images…";
        statusEl.className = "pub-status";
        document.getElementById("pub-link-box").classList.remove("visible");
        document.getElementById("pub-plat-btns").classList.remove("visible");
        try {
          const isMobile = /iPad|iPhone|iPod|Android|Mobile/i.test(
            navigator.userAgent,
          );
          const sizes = getPlatformSizes(),
            slidesToExport =
              state.postMode === "carousel" ? state.slides : [getSlide()];
          const totalFiles = sizes.length * slidesToExport.length;
          let done = 0;
          const mimeMap = {
              png: "image/png",
              jpeg: "image/jpeg",
              webp: "image/webp",
            },
            extMap = { png: "png", jpeg: "jpg", webp: "webp" };
          const ext = extMap[state.fmt],
            mime = mimeMap[state.fmt];
          const renderedFiles = [];
          for (const sz of sizes) {
            for (let si = 0; si < slidesToExport.length; si++) {
              const sfx =
                state.postMode === "carousel" ? `_slide${si + 1}` : "";
              const fname = `mentel_${sz.lbl}${sfx}_${sz.w}x${sz.h}.${ext}`;
              statusEl.textContent = `Rendering ${sz.lbl}${sfx}… (${done + 1}/${totalFiles})`;
              pf.style.width = (done / totalFiles) * 60 + "%";
              await new Promise((r) => setTimeout(r, 18));
              const off = document.createElement("canvas");
              drawCard(off, sz.w, sz.h, slidesToExport[si]);
              const dataUrl = off.toDataURL(
                mime,
                state.fmt === "png" ? 1.0 : 0.93,
              );
              const b64 = dataUrl.split(",")[1];
              const bc = atob(b64),
                ba = new Uint8Array(bc.length);
              for (let b = 0; b < bc.length; b++) ba[b] = bc.charCodeAt(b);
              const blob = new Blob([ba], { type: mime });
              renderedFiles.push({ name: fname, dataUrl, blob, base64: b64 });
              done++;
            }
          }
          const captionContent = `CAPTION FOR YOUR POST\n${"=".repeat(40)}\n\n${pubCaptionText}\n\n${"=".repeat(40)}\nGenerated by Mentel Post Generator\nhttps://content.trymentel.com/`;
          pf.style.width = "65%";
          if (isMobile) {
            statusEl.textContent = "Uploading files…";
            const fileLinks = [];
            for (const f of renderedFiles) {
              try {
                const fd = new FormData();
                fd.append("file", f.blob, f.name);
                const r = await fetch("https://file.io/?expires=7d", {
                  method: "POST",
                  body: fd,
                });
                if (r.ok) {
                  const d = await r.json();
                  if (d.success && d.link) {
                    fileLinks.push({ name: f.name, link: d.link });
                    continue;
                  }
                }
              } catch (e) {}
              const a = document.createElement("a");
              a.href = f.dataUrl;
              a.download = f.name;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              await new Promise((r) => setTimeout(r, 350));
              fileLinks.push({ name: f.name, link: null });
            }
            pf.style.width = "100%";
            showMobileLinks(fileLinks);
            statusEl.textContent = `✅ ${renderedFiles.length} file${renderedFiles.length > 1 ? "s" : ""} ready!`;
            statusEl.className = "pub-status success";
          } else {
            if (typeof JSZip === "undefined") {
              statusEl.textContent =
                "⚠ JSZip not loaded — downloading files directly.";
              statusEl.className = "pub-status error";
              for (const f of renderedFiles) {
                const a = document.createElement("a");
                a.href = f.dataUrl;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                await new Promise((r) => setTimeout(r, 260));
              }
              pf.style.width = "100%";
            } else {
              const zip = new JSZip();
              renderedFiles.forEach((f) =>
                zip.file(f.name, f.base64, { base64: true }),
              );
              zip.file("caption_and_hashtags.txt", captionContent);
              statusEl.textContent = "Bundling ZIP…";
              pf.style.width = "78%";
              await new Promise((r) => setTimeout(r, 40));
              pubZipBlob = await zip.generateAsync({
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: 6 },
              });
              statusEl.textContent = "Uploading for shareable link…";
              pf.style.width = "88%";
              await new Promise((r) => setTimeout(r, 20));
              let linkGenerated = false;
              try {
                const fd = new FormData();
                fd.append("file", pubZipBlob, "mentel_post_package.zip");
                const resp = await fetch("https://file.io/?expires=7d", {
                  method: "POST",
                  body: fd,
                });
                if (resp.ok) {
                  const d = await resp.json();
                  if (d.success && d.link) {
                    pubLinkUrl = d.link;
                    linkGenerated = true;
                  }
                }
              } catch (e) {}
              pf.style.width = "100%";
              await new Promise((r) => setTimeout(r, 150));
              if (linkGenerated) {
                const lb = document.getElementById("pub-link-box");
                lb.classList.add("visible");
                document.getElementById("pub-link-url").textContent =
                  pubLinkUrl;
                document.getElementById("pub-link-expiry").textContent =
                  "⏱ Auto-deletes after first download or 7 days · file.io";
                statusEl.textContent = "✅ Ready! Shareable link generated.";
                statusEl.className = "pub-status success";
              } else {
                statusEl.textContent = "✅ ZIP ready — downloading now.";
                statusEl.className = "pub-status success";
                triggerZipDownload();
              }
            }
          }
          showPlatformOpenButtons();
          pubCopyCaption();
        } catch (err) {
          statusEl.textContent = "⚠ Error: " + err.message;
          statusEl.className = "pub-status error";
        } finally {
          btn.disabled = false;
          document.getElementById("pub-btn-text").innerHTML =
            "Create &amp; Publish";
          document.getElementById("pub-btn-icon").textContent = "🚀";
          setTimeout(() => {
            pw.style.display = "none";
            pf.style.width = "0%";
          }, 800);
        }
      }
      function triggerZipDownload() {
        if (!pubZipBlob) return;
        const url = URL.createObjectURL(pubZipBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `mentel_post_package_${Date.now()}.zip`;
        document.body.appendChild(a);
        a.click();

        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }

      // ── RENDER ACCESSIBILITY PANEL ──────────────────────────────────────────────
      function renderA11yPanel() {
        const wrap = document.getElementById("a11y-results");
        if (!wrap) return;
        const checks = runA11yAudit();
        wrap.innerHTML = "";

        checks.forEach((ch) => {
          const row = mkEl("div", {
            class:
              "a11y-row" +
              (ch.aa
                ? " a11y-pass"
                : ch.ratio >= 3
                  ? " a11y-warn"
                  : " a11y-fail"),
          });

          const icon = ch.aaa ? "✦" : ch.aa ? "✓" : ch.ratio >= 3 ? "◐" : "✗";
          const badge = mkEl("div", { class: "a11y-badge" }, icon);

          const info = mkEl("div", { class: "a11y-info" });
          const label = mkEl("div", { class: "a11y-label" }, ch.label);

          const meta = mkEl("div", { class: "a11y-meta" });
          const ratioStr = ch.ratio.toFixed(2) + ":1";
          const level = ch.aaa
            ? "AAA ✦"
            : ch.aa
              ? "AA ✓"
              : ch.ratio >= 3
                ? "AA Large ◐"
                : "Fail ✗";
          meta.textContent = `${ratioStr} · ${level}`;

          info.append(label, meta);

          // Color swatches
          const swWrap = mkEl("div", { class: "a11y-swatches" });
          const fgSw = mkEl("div", {
            class: "a11y-color-dot",
            title: "Foreground",
            style: `background:rgb(${ch.fg.r},${ch.fg.g},${ch.fg.b});border:1px solid rgba(255,255,255,0.2)`,
          });
          const sep = mkEl("span", { class: "a11y-on" }, "on");
          const bgSw = mkEl("div", {
            class: "a11y-color-dot",
            title: "Background",
            style: `background:rgb(${ch.bg.r},${ch.bg.g},${ch.bg.b});border:1px solid rgba(255,255,255,0.2)`,
          });
          swWrap.append(fgSw, sep, bgSw);

          row.append(badge, info, swWrap);
          wrap.appendChild(row);
        });

        // Overall score
        const passing = checks.filter((ch) => ch.aa).length;
        const total = checks.length;
        const score = mkEl("div", {
          class:
            "a11y-score" +
            (passing === total ? " a11y-score-pass" : " a11y-score-warn"),
        });
        score.textContent = `${passing}/${total} checks passing AA`;
        wrap.insertBefore(score, wrap.firstChild);
      }

      function setPostMode(mode) {
        state.postMode = mode;
        const ss = document.getElementById("sec-slides");
        if (ss) ss.style.display = mode === "carousel" ? "" : "none";
        const sn = document.getElementById("sec-slidenum");
        if (sn) sn.style.display = mode === "carousel" ? "" : "none";
        ["single", "carousel"].forEach((m) => {
          const b = document.getElementById(`mode-${m}`);
          if (b) b.classList.toggle("on", m === mode);
        });
        const hint = document.getElementById("mode-hint");
        if (hint)
          hint.textContent =
            mode === "carousel"
              ? "Multiple slides — each has its own headline & photo."
              : "Single image — one post, one frame.";
        const lbl = document.getElementById("slide-label");
        if (lbl)
          lbl.textContent =
            mode === "carousel" ? `· Slide ${state.currentSlide + 1}` : "";
        updateSlideNav();
        if (mode === "carousel") renderSlideList();
        redrawFn();
        // Auto-switch prompt mode when post mode changes
        if (
          mode === "carousel" &&
          (state._promptMode === "single" || !state._promptMode)
        ) {
          state._promptMode = "carousel";
          state._carouselSlideCount = Math.max(
            3,
            Math.min(10, state.slides.length),
          );
        } else if (mode === "single" && state._promptMode === "carousel") {
          state._promptMode = "single";
        }
      }
      function renderSlideList() {
        const list = document.getElementById("slide-list");
        if (!list) return;
        list.innerHTML = "";
        state.slides.forEach((s, i) => {
          const row = mkEl("div", {
            class: "slide-row" + (i === state.currentSlide ? " on" : ""),
          });
          row.onclick = () => switchSlide(i);
          const num = mkEl("span", { class: "slide-num-badge" }, i + 1);
          const mini = mkEl("div", { class: "slide-mini" });
          const tc = mkEl("canvas");
          tc.width = 56;
          tc.height = 56;
          const tx = tc.getContext("2d");
          tx.fillStyle = "#111";
          tx.fillRect(0, 0, 56, 56);
          if (s.bgImg) {
            const sc = Math.max(56 / s.bgImg.width, 56 / s.bgImg.height);
            const sw2 = s.bgImg.width * sc,
              sh2 = s.bgImg.height * sc;
            tx.globalAlpha = 0.55;
            tx.drawImage(
              s.bgImg,
              -((sw2 - 56) * s.imgOffsetX),
              -((sh2 - 56) * s.imgOffsetY),
              sw2,
              sh2,
            );
            tx.globalAlpha = 1;
          }
          tx.fillStyle = state.accentColor;
          tx.font = "bold 14px sans-serif";
          tx.textAlign = "center";
          tx.fillText(i + 1, 28, 35);
          mini.appendChild(tc);
          const txt = mkEl(
            "span",
            { class: "slide-txt" },
            s.headline || "(empty slide)",
          );
          const del = mkEl("span", { class: "slide-del" }, "✕");
          del.onclick = (e) => {
            e.stopPropagation();
            removeSlide(i);
          };
          row.append(num, mini, txt, del);
          list.appendChild(row);
        });
      }
      function switchSlide(idx) {
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";
        state.currentSlide = idx;
        loadSlideIntoUI();
        renderSlideList();
        updateSlideNav();

      function addSlide() {
        const ta = document.getElementById("txt");
        if (ta) state.slides[state.currentSlide].headline = ta.value;
        state.slides.push({
          headline: "",
          subtext: "",
          body: "",
          attribution: "",
          listItems: ["", "", ""],
          bgImg: null,
          imgOffsetX: 0.5,
          imgOffsetY: 0.0,
        });
        if (state.postMode === "carousel")
          state._carouselSlideCount = Math.max(
            3,
            Math.min(10, state.slides.length),
          );
        switchSlide(state.slides.length - 1);

      function removeSlide(idx) {
        if (state.slides.length <= 1) return;
        state.slides.splice(idx, 1);
        if (state.currentSlide >= state.slides.length)
          state.currentSlide = state.slides.length - 1;
        if (state.postMode === "carousel")
          state._carouselSlideCount = Math.max(
            3,
            Math.min(10, state.slides.length),

        loadSlideIntoUI();
        renderSlideList();
        updateSlideNav();
