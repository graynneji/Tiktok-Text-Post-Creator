<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentel Post Generator</title>
    <meta
      name="description"
      content="Create viral mental health social media posts for TikTok, Instagram and more."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Montserrat:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }

      :root {
        --accent: #2fbf71;
        --accent-dim: rgba(47, 191, 113, 0.12);
        --bg: #0a0a0a;
        --surface: #111111;
        --surface2: #1a1a1a;
        --surface3: #202020;
        --border: #2a2a2a;
        --text: #f0f0f0;
        --text2: #555;
        --text3: #888;
        --input-bg: #0e0e0e;
        --shadow: rgba(0, 0, 0, 0.9);
        --canvas-bg: #070707;
        --danger: #e63946;
        --radius: 7px;
        --pub-bg: #0a140e;
        --pub-border: #1a3322;
      }
      [data-theme="light"] {
        --accent: #18a350;
        --accent-dim: rgba(24, 163, 80, 0.1);
        --bg: #efefed;
        --surface: #ffffff;
        --surface2: #f4f4f2;
        --surface3: #ebebea;
        --border: #e0e0dc;
        --text: #111;
        --text2: #bbb;
        --text3: #888;
        --input-bg: #fafaf8;
        --shadow: rgba(0, 0, 0, 0.1);
        --canvas-bg: #ddddd8;
        --danger: #e63946;
        --pub-bg: #f0fdf5;
        --pub-border: #bbf7d0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
        transition:
          background 0.2s,
          color 0.2s;
      }

      /* ── TOPBAR ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        height: 46px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
        z-index: 10;
      }
      .topbar-logo {
        font-family: "Fraunces", serif;
        font-size: 19px;
        font-weight: 700;
        color: var(--accent);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 1px;
        letter-spacing: -0.5px;
      }
      .topbar-logo span {
        color: var(--text);
      }
      .topbar-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text2);
        flex: 1;
        font-family: "DM Mono", monospace;
      }
      .topbar-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 13px;
        cursor: pointer;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--text3);
        text-transform: uppercase;
        transition: all 0.2s;
        font-family: "Syne", sans-serif;
      }
      .topbar-pill:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── LAYOUT ── */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 46px);
      }

      /* ── PREVIEW PANE ── */
      .preview-pane {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 14px 14px 10px;
        gap: 10px;
        background: var(--canvas-bg);
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }
      .size-tabs {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
        flex-shrink: 0;
      }
      .size-tab {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text2);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 5px 10px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: "Syne", sans-serif;
      }
      .size-tab.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }
      .slide-nav {
        display: none;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .slide-nav.on {
        display: flex;
      }
      .nav-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text3);
        font-size: 14px;
        padding: 4px 13px;
        cursor: pointer;
        transition: all 0.15s;
        line-height: 1;
        font-family: "Syne", sans-serif;
      }
      .nav-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .slide-counter {
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        min-width: 44px;
        text-align: center;
        font-family: "DM Mono", monospace;
      }
      .canvas-wrap {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
        overflow: hidden;
      }
      #preview-canvas {
        border-radius: 6px;
        display: block;
        box-shadow: 0 8px 48px var(--shadow);
        cursor: default;
        user-select: none;
        max-width: 100%;
        max-height: 100%;
      }
      #preview-canvas.draggable {
        cursor: grab;
      }
      #preview-canvas.dragging {
        cursor: grabbing;
      }
      .preview-note {
        font-size: 9px;
        color: var(--text2);
        letter-spacing: 1px;
        text-transform: uppercase;
        flex-shrink: 0;
        font-family: "DM Mono", monospace;
      }

      /* ── CONTROLS PANE ── */
      .controls-pane {
        width: 330px;
        flex-shrink: 0;
        overflow-y: auto;
        overflow-x: hidden;
        border-left: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .controls-pane::-webkit-scrollbar {
        width: 3px;
      }
      .controls-pane::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* ── STYLE SWITCHER ── */
      .style-switcher {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .style-switcher::-webkit-scrollbar {
        display: none;
      }
      .style-btn {
        flex: 1;
        min-width: 58px;
        padding: 9px 4px;
        cursor: pointer;
        text-align: center;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text3);
        border-right: 1px solid var(--border);
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        position: relative;
        white-space: nowrap;
      }
      .style-btn:last-child {
        border-right: none;
      }
      .style-btn.active {
        color: var(--accent);
        background: var(--accent-dim);
      }
      .style-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
      }
      .style-btn-icon {
        font-size: 15px;
        display: block;
        margin-bottom: 3px;
      }

      .style-indicator {
        padding: 8px 15px 2px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        font-family: "DM Mono", monospace;
      }
      .style-desc {
        padding: 2px 15px 10px;
        font-size: 10px;
        color: var(--text3);
        line-height: 1.5;
        border-bottom: 1px solid var(--border);
      }

      /* ── PANEL SECTIONS ── */
      .panel-section {
        border-bottom: 1px solid var(--border);
      }
      .sec-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 15px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }
      .sec-hdr:hover {
        background: var(--surface2);
      }
      .sec-title {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        font-family: "DM Mono", monospace;
      }
      .sec-arrow {
        font-size: 8px;
        color: var(--text2);
        transition: transform 0.2s;
      }
      .panel-section.collapsed .sec-arrow {
        transform: rotate(-90deg);
      }
      .sec-body {
        padding: 12px 15px 15px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .panel-section.collapsed .sec-body {
        display: none;
      }

      /* ── PUBLISH PANEL ── */
      .publish-panel {
        background: var(--pub-bg);
      }
      .publish-panel .sec-hdr {
        border-bottom: 1px solid var(--pub-border);
      }
      .publish-panel .sec-title {
        color: var(--accent);
        font-size: 10px;
        letter-spacing: 2.5px;
      }
      .pub-step-label {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: "DM Mono", monospace;
      }
      .pub-step-num {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 9px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .pub-divider {
        height: 1px;
        background: var(--pub-border);
        margin: 2px 0;
      }
      .platform-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .platform-card {
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 10px 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        background: var(--input-bg);
        position: relative;
      }
      .platform-card:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
        transform: translateY(-1px);
      }
      .platform-card.selected {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .pc-icon {
        font-size: 20px;
        margin-bottom: 3px;
      }
      .pc-name {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text);
      }
      .pc-desc {
        font-size: 8px;
        color: var(--text3);
        margin-top: 2px;
      }
      .pc-check {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 8px;
        font-weight: 900;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .platform-card.selected .pc-check {
        display: flex;
      }
      .pub-progress-wrap {
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      .pub-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #1aff88);
        width: 0%;
        transition: width 0.3s;
      }
      .pub-status {
        font-size: 10px;
        color: var(--text3);
        text-align: center;
        min-height: 16px;
        line-height: 1.5;
        font-family: "DM Mono", monospace;
      }
      .pub-status.success {
        color: var(--accent);
        font-weight: 700;
      }
      .pub-status.error {
        color: var(--danger);
      }
      .publish-btn-main {
        background: var(--accent);
        border: none;
        border-radius: 9px;
        color: #000;
        font-family: "Syne", sans-serif;
        font-weight: 900;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 13px;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 16px rgba(47, 191, 113, 0.25);
      }
      .publish-btn-main:hover {
        opacity: 0.88;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(47, 191, 113, 0.35);
      }
      .publish-btn-main:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* Link box */
      .link-box {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: var(--surface2);
        border: 1px solid var(--pub-border);
        border-radius: 9px;
      }
      .link-box.visible {
        display: flex;
      }
      .link-box-title {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        font-family: "DM Mono", monospace;
      }
      .link-url {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 10px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        word-break: break-all;
        line-height: 1.5;
      }
      .link-actions {
        display: flex;
        gap: 5px;
      }
      .link-btn {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 5px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .link-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .link-btn.accent-bg {
        background: var(--accent);
        color: #000;
        border-color: var(--accent);
      }
      .link-btn.accent-bg:hover {
        opacity: 0.85;
      }
      .link-expiry {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        font-family: "DM Mono", monospace;
      }

      /* Platform open buttons */
      .platform-open-btns {
        display: none;
        flex-direction: column;
        gap: 5px;
      }
      .platform-open-btns.visible {
        display: flex;
      }
      .plat-open-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid var(--border);
        text-decoration: none;
      }
      .plat-open-btn:hover {
        transform: translateX(2px);
      }
      .plat-open-btn.tiktok {
        background: #010101;
        border-color: #333;
      }
      .plat-open-btn.tiktok:hover {
        border-color: #69c9d0;
      }
      .plat-open-btn.instagram {
        background: linear-gradient(
          135deg,
          #833ab4 0%,
          #fd1d1d 50%,
          #fcb045 100%
        );
        border-color: transparent;
      }
      .plat-open-btn.twitter {
        background: #000;
        border-color: #333;
      }
      .plat-open-btn.twitter:hover {
        border-color: #1d9bf0;
      }
      .plat-open-icon {
        font-size: 18px;
        flex-shrink: 0;
      }
      .plat-open-text {
        flex: 1;
      }
      .plat-open-name {
        font-size: 11px;
        font-weight: 800;
        color: #fff;
      }
      .plat-open-sub {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 1px;
      }
      .plat-open-arrow {
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
      }

      /* TikTok Modal */
      .tt-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      .tt-modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 480px;
        padding: 20px 20px 32px;
        position: relative;
        animation: slideUp 0.25s ease;
      }
      @keyframes slideUp {
        from {
          transform: translateY(40px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .tt-modal-close {
        position: absolute;
        top: 14px;
        right: 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 12px;
        color: var(--text3);
        transition: all 0.15s;
      }
      .tt-modal-close:hover {
        border-color: var(--danger);
        color: var(--danger);
      }
      .tt-modal-title {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 4px;
        padding-right: 32px;
      }
      .tt-modal-sub {
        font-size: 10px;
        color: var(--text3);
        margin-bottom: 16px;
        line-height: 1.55;
      }
      .tt-steps {
        display: flex;
        flex-direction: column;
        gap: 9px;
        margin-bottom: 16px;
      }
      .tt-step {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        background: var(--surface2);
        border-radius: 8px;
        padding: 10px 12px;
        border: 1px solid var(--border);
      }
      .tt-step-num {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        color: #000;
        font-size: 9px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .tt-step-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 2px;
      }
      .tt-step-desc {
        font-size: 10px;
        color: var(--text2);
        line-height: 1.5;
      }
      .tt-modal-actions {
        display: flex;
        gap: 8px;
      }
      .tt-action-btn {
        flex: 1;
        padding: 11px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: none;
      }
      .tt-action-primary {
        background: #010101;
        color: #69c9d0;
        border: 1px solid #333;
      }
      .tt-action-primary:hover {
        background: #111;
        border-color: #69c9d0;
      }
      .tt-action-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .tt-action-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── FORM ELEMENTS ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text2);
        display: block;
        font-family: "DM Mono", monospace;
      }
      textarea,
      input[type="text"],
      input[type="number"] {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-weight: 400;
        font-size: 13px;
        padding: 8px 11px;
        outline: none;
        transition: border-color 0.2s;
        resize: none;
        line-height: 1.5;
      }
      textarea {
        min-height: 64px;
        resize: vertical;
      }
      textarea:focus,
      input[type="text"]:focus,
      input[type="number"]:focus {
        border-color: var(--accent);
      }
      input[type="color"] {
        width: 34px;
        height: 30px;
        padding: 2px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--input-bg);
        cursor: pointer;
        outline: none;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
        border-radius: 5px;
      }
      input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 5px;
      }

      .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .g3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
      }

      .range-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--surface);
      }
      .range-val {
        font-size: 10px;
        color: var(--accent);
        font-weight: 700;
        min-width: 30px;
        text-align: right;
        font-family: "DM Mono", monospace;
      }

      /* ── BUTTONS ── */
      .btn-row {
        display: flex;
        gap: 5px;
      }
      .tbtn {
        flex: 1;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 4px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        letter-spacing: 0.3px;
        line-height: 1.3;
        font-family: "Syne", sans-serif;
      }
      .tbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .tbtn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .btn-primary {
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #000;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 12px;
        cursor: pointer;
        transition: opacity 0.2s;
        width: 100%;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 10px;
        padding: 9px 12px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text2);
        font-size: 10px;
        font-weight: 600;
        padding: 7px 10px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        font-family: "Syne", sans-serif;
      }
      .btn-ghost:hover {
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn-ghost-add {
        background: transparent;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 10px;
        font-weight: 600;
        padding: 8px 10px;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
        text-align: center;
        font-family: "Syne", sans-serif;
      }
      .btn-ghost-add:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── UPLOAD ZONE ── */
      .upload-zone {
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        padding: 11px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        position: relative;
      }
      .upload-zone:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .upload-zone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .upload-zone-text {
        font-size: 10px;
        color: var(--text3);
        line-height: 1.6;
      }

      /* ── SWATCHES ── */
      .swatches {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        align-items: center;
      }
      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
      }
      .swatch:hover {
        transform: scale(1.18);
      }
      .swatch.on {
        border-color: var(--text);
      }
      .txt-color-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .txt-swatch {
        width: 24px;
        height: 24px;
        border-radius: 5px;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
      }
      .txt-swatch:hover {
        transform: scale(1.15);
      }
      .txt-swatch.on {
        border-color: var(--accent);
      }

      /* ── MISC UI ── */
      .hint {
        font-size: 10px;
        color: var(--text3);
        line-height: 1.6;
        padding: 8px 10px;
        background: var(--surface2);
        border-radius: 6px;
        border-left: 2px solid var(--border);
      }
      .hint.accent {
        border-left-color: var(--accent);
        color: var(--accent);
      }
      .accent-note {
        font-size: 10px;
        color: var(--accent);
        font-weight: 600;
        line-height: 1.4;
      }
      .prog-wrap {
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      .prog-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.4s;
      }
      .status-text {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        min-height: 14px;
        line-height: 1.5;
        font-family: "DM Mono", monospace;
      }

      .handle-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .handle-prefix {
        position: absolute;
        left: 11px;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        pointer-events: none;
        z-index: 1;
      }
      .handle-wrap input {
        padding-left: 22px;
      }

      /* ── SLIDE LIST ── */
      .slide-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .slide-row {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 7px 10px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .slide-row:hover {
        border-color: var(--text3);
      }
      .slide-row.on {
        border-color: var(--accent);
      }
      .slide-num-badge {
        font-size: 10px;
        font-weight: 800;
        color: var(--accent);
        min-width: 14px;
        font-family: "DM Mono", monospace;
      }
      .slide-mini {
        width: 30px;
        height: 30px;
        border-radius: 4px;
        background: var(--border);
        flex-shrink: 0;
        overflow: hidden;
      }
      .slide-mini canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .slide-txt {
        flex: 1;
        font-size: 10px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .slide-del {
        font-size: 11px;
        color: var(--text2);
        cursor: pointer;
        padding: 3px 6px;
        border-radius: 4px;
        transition: color 0.15s;
      }
      .slide-del:hover {
        color: var(--danger);
      }

      /* ── EXPORT ── */
      .exp-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .exp-item {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .exp-item:hover {
        border-color: var(--accent);
      }
      .exp-item.on {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .exp-name {
        font-size: 10px;
        font-weight: 700;
        color: var(--text);
      }
      .exp-size {
        font-size: 8px;
        color: var(--text3);
        margin-top: 1px;
        font-family: "DM Mono", monospace;
      }
      .exp-ratio {
        font-size: 8px;
        color: var(--accent);
        font-weight: 700;
        margin-top: 2px;
      }

      /* ── CAPTION / PROMPT BOXES ── */
      .caption-box {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.7;
        white-space: pre-wrap;
        max-height: 160px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .prompt-box {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px;
        font-size: 10px;
        color: var(--text3);
        line-height: 1.7;
        white-space: pre-wrap;
        max-height: 220px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .caption-actions {
        display: flex;
        gap: 5px;
        margin-top: 6px;
      }
      .caption-btn {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 10px;
        font-weight: 700;
        padding: 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .caption-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .caption-btn.copied {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── TOPIC CHIPS ── */
      .prompt-topic-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .topic-chip {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        white-space: nowrap;
      }
      .topic-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .topic-chip.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── PLATFORM / CTA ── */
      .plat-wrap {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .plat-btn {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 5px 9px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: "Syne", sans-serif;
      }
      .plat-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .plat-btn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .cta-type-wrap {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .cta-tbtn {
        flex: 1;
        min-width: 46px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 7px 4px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        line-height: 1.4;
        font-family: "Syne", sans-serif;
      }
      .cta-tbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .cta-tbtn.on {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ── CUSTOM SIZE ── */
      .custom-size-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .custom-size-row input {
        flex: 1;
        text-align: center;
      }
      .custom-size-sep {
        font-size: 14px;
        color: var(--text2);
        font-weight: 700;
        flex-shrink: 0;
      }

      /* ── PRESETS ── */
      .preset-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .preset-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .preset-item:hover {
        border-color: var(--accent);
      }
      .preset-item-name {
        flex: 1;
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
      }
      .preset-item-date {
        font-size: 9px;
        color: var(--text2);
        font-family: "DM Mono", monospace;
      }
      .preset-item-del {
        font-size: 11px;
        color: var(--text2);
        cursor: pointer;
        padding: 3px 5px;
        border-radius: 4px;
        transition: color 0.15s;
      }
      .preset-item-del:hover {
        color: var(--danger);
      }

      /* pub caption */
      .pub-caption-preview {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px;
        font-size: 10px;
        color: var(--text);
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 90px;
        overflow-y: auto;
        word-break: break-word;
        font-family: "DM Mono", monospace;
      }
      .pub-copy-btn {
        background: var(--surface3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text3);
        font-size: 9px;
        font-weight: 700;
        padding: 6px 9px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        white-space: nowrap;
      }
      .pub-copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pub-copy-btn.done {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .zip-info {
        font-size: 9px;
        color: var(--text3);
        text-align: center;
        line-height: 1.7;
        padding: 2px 0;
        font-family: "DM Mono", monospace;
      }

      /* ── TYPOGRAPHY CONTROLS ── */
      .typo-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .typo-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .typo-lbl {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text2);
        font-family: "DM Mono", monospace;
        min-width: 60px;
        flex-shrink: 0;
      }
      .typo-val {
        font-size: 9px;
        color: var(--accent);
        font-weight: 700;
        min-width: 34px;
        text-align: right;
        font-family: "DM Mono", monospace;
      }
      .typo-row input[type="range"] {
        flex: 1;
      }
      .typo-reset {
        font-size: 9px;
        color: var(--text2);
        cursor: pointer;
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
        flex-shrink: 0;
      }
      .typo-reset:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .typo-master {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 4px;
      }
      .typo-master .typo-lbl {
        color: var(--text);
        font-size: 10px;
      }
      .typo-divider {
        height: 1px;
        background: var(--border);
        margin: 4px 0;
      }
      .typo-sublabel {
        font-size: 8px;
        color: var(--text2);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "DM Mono", monospace;
        margin-bottom: 2px;
      }

      /* ── OVERLAY / SHAPES ── */
      .overlay-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }
      .overlay-btn {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 3px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Syne", sans-serif;
      }
      .overlay-btn:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .overlay-btn.on {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .overlay-btn-icon {
        font-size: 13px;
        display: block;
        margin-bottom: 2px;
        color: var(--text);
      }
      .overlay-btn-lbl {
        font-size: 7.5px;
        color: var(--text3);
        font-weight: 700;
        letter-spacing: 0.3px;
        line-height: 1.2;
      }
      .overlay-enabled-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .toggle-switch input {
        display: none;
      }
      .toggle-track {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 10px;
        transition: background 0.2s;
      }
      .toggle-switch input:checked + .toggle-track {
        background: var(--accent);
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle-switch input:checked ~ .toggle-thumb {
        transform: translateX(16px);
      }
      .overlay-color-row {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-wrap: wrap;
      }
      .overlay-clr-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
      }
      .overlay-clr-btn:hover {
        transform: scale(1.15);
      }
      .overlay-clr-btn.on {
        border-color: var(--text);
      }

      /* ── ACCESSIBILITY PANEL ── */
      .a11y-score {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 7px 10px;
        border-radius: 6px;
        margin-bottom: 8px;
        text-align: center;
        font-family: "DM Mono", monospace;
      }
      .a11y-score-pass {
        background: rgba(47, 191, 113, 0.12);
        color: var(--accent);
        border: 1px solid rgba(47, 191, 113, 0.3);
      }
      .a11y-score-warn {
        background: rgba(230, 180, 0, 0.1);
        color: #e6b400;
        border: 1px solid rgba(230, 180, 0, 0.3);
      }
      .a11y-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 7px;
        margin-bottom: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
      }
      .a11y-pass {
        border-color: rgba(47, 191, 113, 0.35);
      }
      .a11y-warn {
        border-color: rgba(230, 180, 0, 0.35);
      }
      .a11y-fail {
        border-color: rgba(230, 57, 70, 0.45);
      }
      .a11y-badge {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 900;
      }
      .a11y-pass .a11y-badge {
        background: rgba(47, 191, 113, 0.15);
        color: var(--accent);
      }
      .a11y-warn .a11y-badge {
        background: rgba(230, 180, 0, 0.12);
        color: #e6b400;
      }
      .a11y-fail .a11y-badge {
        background: rgba(230, 57, 70, 0.12);
        color: var(--danger);
      }
      .a11y-info {
        flex: 1;
        min-width: 0;
      }
      .a11y-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text);
      }
      .a11y-meta {
        font-size: 9px;
        color: var(--text3);
        margin-top: 1px;
        font-family: "DM Mono", monospace;
      }

      // All font sizes flow from state.typo.scale (master) × individual overrides

      function getTypoSizes(W) {
        const fS = W / 1080;
        const t = state.typo;
        const sc = t.scale / 100; // master scale 0.5–2.0

        // Base sizes at 1080px canvas before any scaling
        const BASE = {
          headline: 62,
          subtext: 20,
          body: 16,
          tag: 17,
          cta: 19,
          brand: 19,
          handle: 18,
          plat: 11,
        };

        const sz = (key, base) =>
          Math.round((base * fS * sc * (t[key] || 100)) / 100);

        return {
          fS,
          headline: sz("headline", BASE.headline),
          subtext: sz("subtext", BASE.subtext),
          body: sz("body", BASE.body),
          tag: sz("tag", BASE.tag),
          cta: sz("cta", BASE.cta),
          brand: sz("brand", BASE.brand),
          handle: sz("handle", BASE.handle),
          plat: Math.round(BASE.plat * fS * sc), // platform label (tiny, no override needed)
          dot: Math.round(5 * fS * sc),
          brandMidY: Math.round(50 * fS * sc),
          brandH: Math.round(84 * fS * sc),
          edgePad: Math.round(64 * fS * sc),
          padH: W * 0.07,
          padHQ: W * 0.09, // wider padding for quote style
        };
      }

      function hexToRgb(hex) {

      function applyBgAndPhoto(ctx, W, H, s, darkness) {
        const solidColor =
          document.getElementById("bg-solid-color")?.value || "#000";
        const gradFrom =
          document.getElementById("bg-grad-from")?.value || "#0d1b2a";
        const gradTo =
          document.getElementById("bg-grad-to")?.value || "#1b4332";
        if (!s.bgImg) {
          if (state.bgType === "gradient") {
            let grd;
            if (state.gradDir === "radial")
              grd = ctx.createRadialGradient(
                W / 2,
                H / 2,
                0,
                W / 2,
                H / 2,
                Math.max(W, H) * 0.7,
              );
            else if (state.gradDir === "diag")
              grd = ctx.createLinearGradient(0, 0, W, H);
            else grd = ctx.createLinearGradient(0, 0, 0, H);
            grd.addColorStop(0, gradFrom);
            grd.addColorStop(1, gradTo);
            ctx.fillStyle = grd;
          } else {
            ctx.fillStyle = solidColor;
          }
          ctx.fillRect(0, 0, W, H);
          return false;
        }
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, W, H);
        const scale = Math.max(W / s.bgImg.width, H / s.bgImg.height);
        const sw = s.bgImg.width * scale,
          sh = s.bgImg.height * scale;
        const dx = -((sw - W) * s.imgOffsetX),
          dy = -((sh - H) * s.imgOffsetY);
        if (state.photoColorMode === "bw") {
          const oc = document.createElement("canvas");
          oc.width = W;
          oc.height = H;
          const octx = oc.getContext("2d");
          octx.drawImage(s.bgImg, dx, dy, sw, sh);
          const imgd = octx.getImageData(0, 0, W, H);
          const d = imgd.data;
          const bri = 0.88 - darkness * 0.28;
          for (let i = 0; i < d.length; i += 4) {
            let g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
            g = ((g / 255 - 0.5) * 1.12 + 0.5) * 255 * bri;
            g = Math.max(0, Math.min(255, g));
            d[i] = d[i + 1] = d[i + 2] = g;
          }
          octx.putImageData(imgd, 0, 0);
          ctx.drawImage(oc, 0, 0);
        } else {
          ctx.drawImage(s.bgImg, dx, dy, sw, sh);
        }
        return true;
      }
      function drawOverlay(ctx, W, H, darkness, hasPhoto) {
        if (!hasPhoto) return;

        const gradTo =
          document.getElementById("bg-grad-to")?.value || "#1a1a2e";
        if (state.bgType === "gradient") {
          let grd;
          if (state.gradDir === "radial")
            grd = ctx.createRadialGradient(
              W / 2,
              H / 2,
              0,
              W / 2,
              H / 2,
              Math.max(W, H) * 0.7,
            );
          else if (state.gradDir === "diag")
            grd = ctx.createLinearGradient(0, 0, W, H);
          else grd = ctx.createLinearGradient(0, 0, 0, H);
          grd.addColorStop(0, gradFrom);
          grd.addColorStop(1, gradTo);
          ctx.fillStyle = grd;
        } else {
          ctx.fillStyle = solidColor;
        }
        ctx.fillRect(0, 0, W, H);
        const rgb = hexToRgb(acc);
        ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.04)`;
        for (let i = 0; i < 60; i++) {
          const cx = (i * 137.5) % W,
            cy = (i * 97.3) % H;
          ctx.beginPath();
          ctx.arc(cx, cy, Math.round(fS * (1 + (i % 3))), 0, Math.PI * 2);
          ctx.fill();
        }
        drawBrandBar(ctx, W, H, fS, acc, logoImg, logoSzPx, brandName);
        const headFS = tz.headline,
          subFS = tz.subtext,
          lineH = headFS * 1.12;
        let textX = ta === "center" ? W / 2 : ta === "right" ? W - padH : padH;
        const ctxAlign =
          ta === "center" ? "center" : ta === "right" ? "right" : "left";
        ctx.font = `800 ${headFS}px Montserrat, Arial Black, sans-serif`;
        const lines = wrapText(ctx, s.headline || "", usableW);
        const subLines = s.subtext
          ? wrapTextCapped(ctx, s.subtext, usableW, 2)
          : [];
        const brandH = tz.brandH,
          totalH =
            brandH +
            lines.length * lineH +
            (subLines.length
              ? subLines.length * (subFS * 1.4) + Math.round(24 * fS * sc)
              : 0);
        let blockTop =
          vp === "top"
            ? Math.round(60 * fS)
            : vp === "bottom"
              ? H - totalH - Math.round(60 * fS)
              : (H - totalH) / 2;
        blockTop += ((state.textOffsetY || 0) / 100) * H;
        blockTop = Math.max(Math.round(80 * fS), Math.min(H * 0.75, blockTop));
        let y = blockTop;
        ctx.fillStyle = tc;
        ctx.textAlign = ctxAlign;
        lines.forEach((l, i) => ctx.fillText(l, textX, y + (i + 1) * lineH));
        y += lines.length * lineH;
        if (subLines.length) {
          y += Math.round(24 * fS * sc);
          const ruleX =
            ta === "center"
              ? W / 2 - Math.round(20 * fS * sc)
              : ta === "right"
                ? W - padH - Math.round(40 * fS * sc)
                : padH;
          ctx.fillStyle = acc;
          ctx.fillRect(
            ruleX,
            y,
            Math.round(40 * fS * sc),
            Math.round(2 * fS * sc),
          );
          y += Math.round(16 * fS * sc);
          ctx.font = `300 ${subFS}px Syne, sans-serif`;
          ctx.fillStyle = "rgba(240,240,240,0.55)";
          ctx.textAlign = ctxAlign;
          subLines.forEach((l, i) =>
            ctx.fillText(l, textX, y + (i + 1) * (subFS * 1.4)),
          );
          y += subLines.length * (subFS * 1.4);
        }
        drawDecorativeOverlay(ctx, W, H, acc);
        drawHandle(ctx, W, fS, acc, y + Math.round(24 * fS * sc));
        drawSlideIndicator(ctx, W, H, s, fS, acc);
        ctx.textAlign = "left";
      }
      // ── DECORATIVE OVERLAY / SHAPES ────────────────────────────────────────────────
      const OVERLAY_PRESETS = [
        { id: "none", label: "∅ None", icon: "○" },
        { id: "geo-grid", label: "Geo Grid", icon: "▦" },
        { id: "diagonal-lines", label: "Diagonal Lines", icon: "╱╱" },
        { id: "radial-burst", label: "Radial Burst", icon: "✳" },
        { id: "corner-bracket", label: "Corner Brackets", icon: "⌐" },
        { id: "scanlines", label: "Scanlines", icon: "≡" },
        { id: "halftone", label: "Halftone Dots", icon: "⣿" },
        { id: "arc-frame", label: "Arc Frame", icon: "◕" },
        { id: "crosshatch", label: "Crosshatch", icon: "⊞" },
        { id: "noise-grain", label: "Noise Grain", icon: "∵" },
        { id: "bokeh", label: "Bokeh Circles", icon: "◎" },
        { id: "paint-slash", label: "Paint Slash", icon: "⟋" },
        { id: "circuit", label: "Circuit Lines", icon: "⌬" },
      ];

      function drawDecorativeOverlay(ctx, W, H, acc) {
        const ov = state.overlay;
        if (!ov.enabled || ov.preset === "none") return;

        const op = (ov.opacity || 40) / 100;
        const clr =
          ov.color === "accent"
            ? acc
            : ov.color === "white"
              ? "#ffffff"
              : ov.color === "black"
                ? "#000000"
                : ov.customColor || "#ffffff";

        const { r, g, b } = hexToRgb(clr);
        const rgba = (a) => `rgba(${r},${g},${b},${(a * op).toFixed(3)})`;

        ctx.save();
        const blend = ov.blend || "normal";
        ctx.globalCompositeOperation =
          blend === "normal" ? "source-over" : blend;

        const p = ov.preset;
        const fS = W / 1080;

        if (p === "geo-grid") {
          const step = Math.round(90 * fS);
          ctx.strokeStyle = rgba(0.45);
          ctx.lineWidth = Math.round(1 * fS);
          for (let x = 0; x <= W; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
          }
          for (let y = 0; y <= H; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
          }
          // Accent cross-dots at intersections
          ctx.fillStyle = rgba(0.7);
          for (let x = step; x < W; x += step) {
            for (let y = step; y < H; y += step) {
              ctx.beginPath();
              ctx.arc(x, y, Math.round(3 * fS), 0, Math.PI * 2);
              ctx.fill();
            }
          }
        } else if (p === "diagonal-lines") {
          const gap = Math.round(55 * fS);
          ctx.strokeStyle = rgba(0.3);
          ctx.lineWidth = Math.round(1.5 * fS);
          for (let i = -H; i < W + H; i += gap) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + H, H);
            ctx.stroke();
          }
        } else if (p === "radial-burst") {
          const cx = W * 0.5,
            cy = H * 0.35;
          const rays = 24,
            len = Math.max(W, H) * 0.9;
          ctx.strokeStyle = rgba(0.18);
          ctx.lineWidth = Math.round(1 * fS);
          for (let i = 0; i < rays; i++) {
            const a = (i / rays) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
            ctx.stroke();
          }
          // Inner circles
          ctx.strokeStyle = rgba(0.25);
          [0.12, 0.28, 0.48].forEach((r2) => {
            ctx.beginPath();
            ctx.arc(cx, cy, W * r2, 0, Math.PI * 2);
            ctx.stroke();
          });
        } else if (p === "corner-bracket") {
          const m = Math.round(48 * fS);
          const bl = Math.round(80 * fS);
          const lw = Math.round(3 * fS);
          ctx.strokeStyle = rgba(0.9);
          ctx.lineWidth = lw;
          // TL
          ctx.beginPath();
          ctx.moveTo(m, m + bl);
          ctx.lineTo(m, m);
          ctx.lineTo(m + bl, m);
          ctx.stroke();
          // TR
          ctx.beginPath();
          ctx.moveTo(W - m - bl, m);
          ctx.lineTo(W - m, m);
          ctx.lineTo(W - m, m + bl);
          ctx.stroke();
          // BL
          ctx.beginPath();
          ctx.moveTo(m, H - m - bl);
          ctx.lineTo(m, H - m);
          ctx.lineTo(m + bl, H - m);
          ctx.stroke();
          // BR
          ctx.beginPath();
          ctx.moveTo(W - m - bl, H - m);
          ctx.lineTo(W - m, H - m);
          ctx.lineTo(W - m, H - m - bl);
          ctx.stroke();
          // Subtle inner rectangle
          ctx.strokeStyle = rgba(0.2);
          ctx.lineWidth = lw * 0.5;
          const im = m + Math.round(20 * fS);
          ctx.strokeRect(im, im, W - im * 2, H - im * 2);
        } else if (p === "scanlines") {
          const gap = Math.round(8 * fS);
          ctx.fillStyle = rgba(0.12);
          for (let y = 0; y < H; y += gap * 2) {
            ctx.fillRect(0, y, W, gap);
          }
        } else if (p === "halftone") {
          const spacing = Math.round(40 * fS);
          const maxR = Math.round(6 * fS);
          ctx.fillStyle = rgba(0.35);
          for (let x = spacing / 2; x < W; x += spacing) {
            for (let y = spacing / 2; y < H; y += spacing) {
              const distFromCenter = Math.sqrt(
                Math.pow(x / W - 0.5, 2) + Math.pow(y / H - 0.5, 2),
              );
              const r2 = maxR * (0.3 + distFromCenter * 1.2);
              ctx.beginPath();
              ctx.arc(x, y, Math.min(r2, maxR), 0, Math.PI * 2);
              ctx.fill();
            }
          }
        } else if (p === "arc-frame") {
          ctx.strokeStyle = rgba(0.5);
          ctx.lineWidth = Math.round(2.5 * fS);
          // Large arcs in corners
          const r2 = W * 0.65;
          ctx.beginPath();
          ctx.arc(0, 0, r2, 0, Math.PI * 0.5);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(W, H, r2, Math.PI, Math.PI * 1.5);
          ctx.stroke();
          ctx.strokeStyle = rgba(0.25);
          ctx.lineWidth = Math.round(1.5 * fS);
          ctx.beginPath();
          ctx.arc(W, 0, r2 * 0.7, Math.PI * 0.5, Math.PI);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, H, r2 * 0.7, -Math.PI * 0.5, 0);
          ctx.stroke();
        } else if (p === "crosshatch") {
          const gap = Math.round(44 * fS);
          ctx.strokeStyle = rgba(0.2);
          ctx.lineWidth = Math.round(1 * fS);
          for (let i = -H; i < W + H; i += gap) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + H, H);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(i + H, 0);
            ctx.lineTo(i, H);
            ctx.stroke();
          }
        } else if (p === "noise-grain") {
          // Seeded noise pattern using canvas pixel manipulation
          const offC = document.createElement("canvas");
          offC.width = W;
          offC.height = H;
          const offX = offC.getContext("2d");
          const imgData = offX.createImageData(W, H);
          const data = imgData.data;
          let seed2 = 12345;
          const rand = () => {
            seed2 = (seed2 * 1664525 + 1013904223) & 0xffffffff;
            return (seed2 >>> 0) / 0xffffffff;
          };
          for (let i = 0; i < data.length; i += 4) {
            const v = rand() > 0.5 ? 255 : 0;
            data[i] = r;
            data[i + 1] = g;
            data[i + 2] = b;
            data[i + 3] = rand() > 0.85 ? Math.round(op * 80) : 0;
          }
          offX.putImageData(imgData, 0, 0);
          ctx.drawImage(offC, 0, 0);
        } else if (p === "bokeh") {
          const circles = [
            { x: 0.15, y: 0.12, r: 0.08, a: 0.25 },
            { x: 0.82, y: 0.08, r: 0.06, a: 0.18 },
            { x: 0.9, y: 0.55, r: 0.1, a: 0.2 },
            { x: 0.05, y: 0.7, r: 0.07, a: 0.22 },
            { x: 0.55, y: 0.85, r: 0.09, a: 0.15 },
            { x: 0.3, y: 0.05, r: 0.05, a: 0.3 },
            { x: 0.7, y: 0.25, r: 0.04, a: 0.28 },
            { x: 0.2, y: 0.45, r: 0.06, a: 0.18 },
          ];
          circles.forEach((c) => {
            const grd = ctx.createRadialGradient(
              c.x * W,
              c.y * H,
              0,
              c.x * W,
              c.y * H,
              c.r * W,
            );
            grd.addColorStop(
              0,
              `rgba(${r},${g},${b},${(c.a * op).toFixed(3)})`,
            );
            grd.addColorStop(
              0.6,
              `rgba(${r},${g},${b},${(c.a * op * 0.3).toFixed(3)})`,
            );
            grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(c.x * W, c.y * H, c.r * W, 0, Math.PI * 2);
            ctx.fill();
          });
        } else if (p === "paint-slash") {
          // Bold diagonal brush stroke across image
          ctx.strokeStyle = rgba(0.5);
          ctx.lineWidth = Math.round(W * 0.04);
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(W * 0.02, H * 0.18);
          ctx.bezierCurveTo(
            W * 0.25,
            H * 0.1,
            W * 0.75,
            H * 0.35,
            W * 0.98,
            H * 0.28,
          );
          ctx.stroke();
          ctx.lineWidth = Math.round(W * 0.015);
          ctx.strokeStyle = rgba(0.3);
          ctx.beginPath();
          ctx.moveTo(W * 0.05, H * 0.72);
          ctx.bezierCurveTo(
            W * 0.3,
            H * 0.65,
            W * 0.7,
            H * 0.88,
            W * 0.95,
            H * 0.78,
          );
          ctx.stroke();
          ctx.lineCap = "butt";
        } else if (p === "circuit") {
          const step = Math.round(65 * fS);
          ctx.strokeStyle = rgba(0.3);
          ctx.lineWidth = Math.round(1.5 * fS);
          ctx.fillStyle = rgba(0.6);
          // Horizontal + vertical segments with right-angle turns
          const pts = [
            [
              [0.1, 0.2],
              [0.4, 0.2],
              [0.4, 0.5],
              [0.7, 0.5],
              [0.7, 0.3],
              [0.95, 0.3],
            ],
            [
              [0.05, 0.65],
              [0.25, 0.65],
              [0.25, 0.8],
              [0.6, 0.8],
              [0.6, 0.65],
              [0.9, 0.65],
            ],
            [
              [0.15, 0.05],
              [0.15, 0.35],
              [0.55, 0.35],
            ],
            [
              [0.8, 0.55],
              [0.8, 0.9],
              [0.45, 0.9],
              [0.45, 0.7],
            ],
          ];
          pts.forEach((path) => {
            ctx.beginPath();
            path.forEach(([px, py], i) =>
              i === 0 ? ctx.moveTo(px * W, py * H) : ctx.lineTo(px * W, py * H),
            );
            ctx.stroke();
            // Node dots
            path.forEach(([px, py]) => {
              ctx.beginPath();
              ctx.arc(px * W, py * H, Math.round(4 * fS), 0, Math.PI * 2);
              ctx.fill();
            });
          });
        }

        ctx.restore();
      }

      function drawCard(canvas, W, H, s) {
        const ctx = canvas.getContext("2d");
        canvas.width = W;
        canvas.height = H;
        if (state.currentStyle === "bold") drawBold(ctx, W, H, s);
        else if (state.currentStyle === "editorial")
          drawEditorial(ctx, W, H, s);
        else if (state.currentStyle === "quote") drawQuote(ctx, W, H, s);
        else if (state.currentStyle === "listicle") drawListicle(ctx, W, H, s);
        else if (state.currentStyle === "minimal") drawMinimal(ctx, W, H, s);
      }

      // ═══════════════════════════════════════════════════════════════
      // SIDEBAR — helpers
      // ═══════════════════════════════════════════════════════════════
      // ═══════════════════════════════════════════════════════════════
      // ACCESSIBILITY ENGINE
      // ═══════════════════════════════════════════════════════════════

      // Parse any CSS color string to {r,g,b,a}
      function parseColor(str) {
        if (!str) return null;
        str = str.trim();
        if (str === "accent") str = state.accentColor;
        // Hex
        if (str.startsWith("#")) {
          const h = str.slice(1);
          if (h.length === 3)
            return {
              r: parseInt(h[0] + h[0], 16),
              g: parseInt(h[1] + h[1], 16),
              b: parseInt(h[2] + h[2], 16),
              a: 1,
            };
          if (h.length === 6)
            return {
              r: parseInt(h.slice(0, 2), 16),
              g: parseInt(h.slice(2, 4), 16),
              b: parseInt(h.slice(4, 6), 16),
              a: 1,
            };
        }
        // rgba/rgb
        const m = str.match(
          /rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/,
        );
        if (m)
          return {
            r: +m[1],
            g: +m[2],
            b: +m[3],
            a: m[4] !== undefined ? +m[4] : 1,
          };
        // Named
        const names = {
          white: { r: 255, g: 255, b: 255, a: 1 },
          black: { r: 0, g: 0, b: 0, a: 1 },
          "#000000": { r: 0, g: 0, b: 0, a: 1 },
          "#ffffff": { r: 255, g: 255, b: 255, a: 1 },
        };
        return names[str] || null;
      }

      // Relative luminance (WCAG 2.1)
      function relativeLuminance(r, g, b) {
        const [rs, gs, bs] = [r, g, b].map((v) => {
          const s = v / 255;
          return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
      }

      // WCAG contrast ratio
      function contrastRatio(c1, c2) {
        if (!c1 || !c2) return 1;
        const L1 = relativeLuminance(c1.r, c1.g, c1.b);
        const L2 = relativeLuminance(c2.r, c2.g, c2.b);
        const lighter = Math.max(L1, L2),
          darker = Math.min(L1, L2);
        return (lighter + 0.05) / (darker + 0.05);
      }

      // Blend foreground onto background (considering photo overlay)
      function effectiveBackground(hasBgPhoto, bgColor, overlayDarkness) {
        if (hasBgPhoto) {
          // Approximation: photo avg ~35% luminance with overlay applied
          const d = overlayDarkness || 0.65;
          const v = Math.round(255 * 0.35 * (1 - d));
          return { r: v, g: v, b: v, a: 1 };
        }
        return parseColor(bgColor) || { r: 0, g: 0, b: 0, a: 1 };
      }

      // Blend overlay color on top of background (simplified alpha blend)
      function blendOnBg(fg, bg, alpha) {
        return {
          r: Math.round(fg.r * alpha + bg.r * (1 - alpha)),
          g: Math.round(fg.g * alpha + bg.g * (1 - alpha)),
          b: Math.round(fg.b * alpha + bg.b * (1 - alpha)),
          a: 1,
        };
      }

      // Suggest corrected text color for minimum contrast
      function suggestTextColor(bgColor, minRatio) {
        const bg = parseColor(bgColor) || { r: 0, g: 0, b: 0, a: 1 };
        const white = { r: 255, g: 255, b: 255 };
        const black = { r: 0, g: 0, b: 0 };
        const rW = contrastRatio(white, bg);
        const rB = contrastRatio(black, bg);
        if (rW >= minRatio) return "#ffffff";
        if (rB >= minRatio) return "#000000";
        // Neither pure white/black meets minimum — return whichever is better
        return rW > rB ? "#ffffff" : "#000000";
      }

      // Run full accessibility audit and return results
      function runA11yAudit() {
        const hasBgPhoto = !!getSlide().bgImg;
        const solidColor =
          document.getElementById("bg-solid-color")?.value || "#000000";
        const darkness =
          parseInt(document.getElementById("darkness")?.value || "65") / 100;

        const bg = effectiveBackground(hasBgPhoto, solidColor, darkness);
        const textC = parseColor(
          state.textColor === "accent" ? state.accentColor : state.textColor,
        ) || { r: 255, g: 255, b: 255 };
        const accC = parseColor(state.accentColor) || { r: 47, g: 191, b: 113 };
        const white = { r: 255, g: 255, b: 255 };
        const black = { r: 0, g: 0, b: 0 };

        // Overlay color (if enabled)
        let ovColorResolved = null;
        if (state.overlay.enabled && state.overlay.preset !== "none") {
          const ovClrStr =
            state.overlay.color === "accent"
              ? state.accentColor
              : state.overlay.color === "white"
                ? "#ffffff"
                : state.overlay.color === "black"
                  ? "#000000"
                  : state.overlay.customColor || "#ffffff";
          ovColorResolved = parseColor(ovClrStr);
        }

        const checks = [];

        // 1. Headline text on background
        const headRatio = contrastRatio(textC, bg);
        checks.push({
          id: "headline",
          label: "Headline text",
          ratio: headRatio,
          aa: headRatio >= 4.5,
          aaa: headRatio >= 7,
          fg: textC,
          bg,
          suggestion:
            headRatio < 4.5
              ? suggestTextColor(
                  state.textColor === "accent"
                    ? state.accentColor
                    : state.textColor,
                  4.5,
                )
              : null,
        });

        // 2. Accent (tag, CTA, handle) on background
        const accRatio = contrastRatio(accC, bg);
        checks.push({
          id: "accent",
          label: "Accent / Tag text",
          ratio: accRatio,
          aa: accRatio >= 4.5,
          aaa: accRatio >= 7,
          fg: accC,
          bg,
          suggestion: accRatio < 4.5 ? null : null, // accent is design choice
        });

        // 3. Overlay vs text (if overlay enabled)
        if (ovColorResolved) {
          const ovAlpha = (state.overlay.opacity || 40) / 100;
          const blendedOv = blendOnBg(ovColorResolved, bg, ovAlpha);
          const ovVsText = contrastRatio(textC, blendedOv);
          checks.push({
            id: "overlay",
            label: "Text over overlay",
            ratio: ovVsText,
            aa: ovVsText >= 4.5,
            aaa: ovVsText >= 7,
            fg: textC,
            bg: blendedOv,
            suggestion:
              ovVsText < 4.5
                ? "Reduce overlay opacity or change overlay color"
                : null,
          });
        }

        // 4. White text on bg (brand bar area is often brighter)
        const brandTextRatio = contrastRatio(white, bg);
        checks.push({
          id: "brand",
          label: "Brand / Handle text",
          ratio: brandTextRatio,
          aa: brandTextRatio >= 4.5,
          aaa: brandTextRatio >= 7,
          fg: white,
          bg,
        });

        return checks;
      }

      // Luminance-based suggestion for overlay opacity that maintains AA for text
      function suggestOverlayOpacity(
        textColor,
        bgColor,
        overlayColor,
        minRatio,
      ) {
        const fg = parseColor(
          textColor === "accent" ? state.accentColor : textColor,
        ) || { r: 255, g: 255, b: 255 };
        const bg = parseColor(bgColor) || { r: 0, g: 0, b: 0 };
        const ov = parseColor(overlayColor) || { r: 255, g: 255, b: 255 };
        // Binary search for max opacity where text still passes
        let lo = 0,
          hi = 100;
        for (let i = 0; i < 15; i++) {
          const mid = (lo + hi) / 2;
          const blended = blendOnBg(ov, bg, mid / 100);
          contrastRatio(fg, blended) >= minRatio ? (lo = mid) : (hi = mid);
        }
        return Math.round(lo);
      }

      // Auto-fix accessibility issues
      function autoFixA11y() {
        const checks = runA11yAudit();
        let fixed = [];

        checks.forEach((ch) => {
          if (!ch.aa) {
            if (ch.id === "headline" && ch.suggestion) {
              state.textColor = ch.suggestion;
              // Update swatch UI
              document
                .querySelectorAll(".txt-swatch")
                .forEach((s) => s.classList.remove("on"));
              fixed.push("Headline text → " + ch.suggestion);
            }
            if (ch.id === "overlay") {
              // Reduce overlay opacity until text passes
              const ovClrStr =
                state.overlay.color === "accent"
                  ? state.accentColor
                  : state.overlay.color === "white"
                    ? "#ffffff"
                    : state.overlay.color === "black"
                      ? "#000000"
                      : state.overlay.customColor || "#ffffff";
              const bgColor =
                document.getElementById("bg-solid-color")?.value || "#000000";
              const safeOp = suggestOverlayOpacity(
                state.textColor,
                bgColor,
                ovClrStr,
                4.5,
              );
              if (safeOp < (state.overlay.opacity || 40)) {
                state.overlay.opacity = Math.max(5, safeOp);
                const opEl = document.getElementById("overlay-opacity");
                if (opEl) opEl.value = state.overlay.opacity;
                const opVEl = document.getElementById("overlay-opacity-val");
                if (opVEl) opVEl.textContent = state.overlay.opacity;
                fixed.push(
                  `Overlay opacity → ${state.overlay.opacity}% (text now passes AA)`,
                );
              }
            }
          }
        });

        redrawFn();
        renderA11yPanel();
        return fixed;
      }

      function togglePubPlatform(id, el) {
        if (id === "all") {
          if (pubPlatforms.size === 4) {
            pubPlatforms.clear();
            document
              .querySelectorAll(".platform-card")
              .forEach((c) => c.classList.remove("selected"));
          } else {
            pubPlatforms = new Set(["tiktok", "instagram", "twitter", "all"]);
            document
              .querySelectorAll(".platform-card")
              .forEach((c) => c.classList.add("selected"));
          }
          return;
        }
        if (pubPlatforms.has(id)) {
          pubPlatforms.delete(id);
          el.classList.remove("selected");
        } else {
          pubPlatforms.add(id);
          el.classList.add("selected");
        }
      }

      const MH_HASHTAGS = [
        "#MentalHealth",
        "#MentalHealthAwareness",

        "#SelfCare",
        "#Mindset",

        "#Therapy",
