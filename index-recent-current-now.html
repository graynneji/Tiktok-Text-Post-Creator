      function buildCapText(tone) {
        const hl = document.getElementById("txt")?.value?.trim() || "";
        const tag = document.getElementById("tag")?.value?.trim() || "";
        const m = PLATFORM_META[state.platform];
        const handle =
          state.platform !== "none" && m.handle
            ? `${m.prefix}${m.handle}`
            : "Mentel";
        const tags = [...MH_HASHTAGS]
          .sort(() => Math.random() - 0.5)
          .slice(0, 9)
          .join(" ");
        if (tone === "tiktok")
          return `${hl}\n\n${tag ? tag + " | " : ""}Drop a ✅ if this hits!\n\n👉 Follow ${handle} for more\n\n${tags}`;
        if (tone === "ig")
          return `💭 ${hl}\n\n${tag ? "[" + tag + "]\n\n" : ""}Save this post — someone you know needs to see it.\n\nFollow ${handle} for daily mental health insights.\n\n.\n.\n.\n${tags}`;
        const short = hl.length > 200 ? hl.slice(0, 197) + "…" : hl;
        return `${short}\n\n${tags.split(" ").slice(0, 5).join(" ")}`;
      }
      function pubGenerateCaption() {
        pubCaptionText = buildCapText(pubTone);
        const el = document.getElementById("pub-caption-preview");
        if (el) el.textContent = pubCaptionText;
        const btn = document.getElementById("pub-copy-caption-btn");
        if (btn) {
          btn.textContent = "📋 Copy";
          btn.classList.remove("done");
        }
      }
      function pubCopyCaption() {
        if (!pubCaptionText) pubGenerateCaption();
        const btn = document.getElementById("pub-copy-caption-btn");
        fallbackCopy(pubCaptionText, () => {
          if (btn) {
            btn.textContent = "✅ Copied!";
            btn.classList.add("done");
            setTimeout(() => {
              btn.textContent = "📋 Copy";
              btn.classList.remove("done");
            }, 2000);
          }
        });
      }

      function getPlatformSizes() {
        const s = [],
          all = pubPlatforms.has("all");
        if (all || pubPlatforms.has("tiktok")) {
          s.push({ w: 1080, h: 1350, lbl: "TikTok-Normal-4x5" });
          s.push({ w: 1080, h: 1920, lbl: "TikTok-Full-9x16" });
        }
        if (all || pubPlatforms.has("instagram")) {
          s.push({ w: 1080, h: 1920, lbl: "IG-Story-9x16" });
          s.push({ w: 1080, h: 1080, lbl: "IG-Square-1x1" });
          s.push({ w: 1080, h: 1350, lbl: "IG-Portrait-4x5" });
        }
        if (all || pubPlatforms.has("twitter"))
          s.push({ w: 1080, h: 1080, lbl: "Twitter-Square-1x1" });
        const seen = new Set();
        return s.filter((x) => {
          if (seen.has(x.lbl)) return false;
          seen.add(x.lbl);
          return true;
        });
      }

      async function publishAll() {
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";
        pubGenerateCaption();
        const btn = document.getElementById("pub-main-btn"),
          statusEl = document.getElementById("pub-status");
        const pw = document.getElementById("pub-pw"),
          pf = document.getElementById("pub-pf");
        btn.disabled = true;
        document.getElementById("pub-btn-text").textContent = "Rendering…";
        document.getElementById("pub-btn-icon").textContent = "⏳";
        pw.style.display = "block";
        statusEl.textContent = "Generating images…";
        statusEl.className = "pub-status";
        document.getElementById("pub-link-box").classList.remove("visible");
        document.getElementById("pub-plat-btns").classList.remove("visible");
        try {
          const isMobile = /iPad|iPhone|iPod|Android|Mobile/i.test(
            navigator.userAgent,
          );
          const sizes = getPlatformSizes(),
            slidesToExport =
              state.postMode === "carousel" ? state.slides : [getSlide()];
          const totalFiles = sizes.length * slidesToExport.length;
          let done = 0;
          const mimeMap = {
              png: "image/png",
              jpeg: "image/jpeg",
              webp: "image/webp",
            },
            extMap = { png: "png", jpeg: "jpg", webp: "webp" };
          const ext = extMap[state.fmt],
            mime = mimeMap[state.fmt];
          const renderedFiles = [];
          for (const sz of sizes) {
            for (let si = 0; si < slidesToExport.length; si++) {
              const sfx =
                state.postMode === "carousel" ? `_slide${si + 1}` : "";
              const fname = `mentel_${sz.lbl}${sfx}_${sz.w}x${sz.h}.${ext}`;
              statusEl.textContent = `Rendering ${sz.lbl}${sfx}… (${done + 1}/${totalFiles})`;
              pf.style.width = (done / totalFiles) * 60 + "%";
              await new Promise((r) => setTimeout(r, 18));
              const off = document.createElement("canvas");
              drawCard(off, sz.w, sz.h, slidesToExport[si]);
              const dataUrl = off.toDataURL(
                mime,
                state.fmt === "png" ? 1.0 : 0.93,
              );
              const b64 = dataUrl.split(",")[1];
              const bc = atob(b64),
                ba = new Uint8Array(bc.length);
              for (let b = 0; b < bc.length; b++) ba[b] = bc.charCodeAt(b);
              const blob = new Blob([ba], { type: mime });
              renderedFiles.push({ name: fname, dataUrl, blob, base64: b64 });
              done++;
            }
          }
          const captionContent = `CAPTION FOR YOUR POST\n${"=".repeat(40)}\n\n${pubCaptionText}\n\n${"=".repeat(40)}\nGenerated by Mentel Post Generator\nhttps://content.trymentel.com/`;
          pf.style.width = "65%";
          if (isMobile) {
            statusEl.textContent = "Uploading files…";
            const fileLinks = [];
            for (const f of renderedFiles) {
              try {
                const fd = new FormData();
                fd.append("file", f.blob, f.name);
                const r = await fetch("https://file.io/?expires=7d", {
                  method: "POST",
                  body: fd,
                });
                if (r.ok) {
                  const d = await r.json();
                  if (d.success && d.link) {
                    fileLinks.push({ name: f.name, link: d.link });
                    continue;
                  }
                }
              } catch (e) {}
              const a = document.createElement("a");
              a.href = f.dataUrl;
              a.download = f.name;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              await new Promise((r) => setTimeout(r, 350));
              fileLinks.push({ name: f.name, link: null });
            }
            pf.style.width = "100%";
            showMobileLinks(fileLinks);
            statusEl.textContent = `✅ ${renderedFiles.length} file${renderedFiles.length > 1 ? "s" : ""} ready!`;
            statusEl.className = "pub-status success";
          } else {
            if (typeof JSZip === "undefined") {
              statusEl.textContent =
                "⚠ JSZip not loaded — downloading files directly.";
              statusEl.className = "pub-status error";
              for (const f of renderedFiles) {
                const a = document.createElement("a");
                a.href = f.dataUrl;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                await new Promise((r) => setTimeout(r, 260));
              }
              pf.style.width = "100%";
            } else {
              const zip = new JSZip();
              renderedFiles.forEach((f) =>
                zip.file(f.name, f.base64, { base64: true }),
              );
              zip.file("caption_and_hashtags.txt", captionContent);
              statusEl.textContent = "Bundling ZIP…";
              pf.style.width = "78%";
              await new Promise((r) => setTimeout(r, 40));
              pubZipBlob = await zip.generateAsync({
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: 6 },
              });
              statusEl.textContent = "Uploading for shareable link…";
              pf.style.width = "88%";
              await new Promise((r) => setTimeout(r, 20));
              let linkGenerated = false;
              try {
                const fd = new FormData();
                fd.append("file", pubZipBlob, "mentel_post_package.zip");
                const resp = await fetch("https://file.io/?expires=7d", {
                  method: "POST",
                  body: fd,
                });
                if (resp.ok) {
                  const d = await resp.json();
                  if (d.success && d.link) {
                    pubLinkUrl = d.link;
                    linkGenerated = true;
                  }
                }
              } catch (e) {}
              pf.style.width = "100%";
              await new Promise((r) => setTimeout(r, 150));
              if (linkGenerated) {
                const lb = document.getElementById("pub-link-box");
                lb.classList.add("visible");
                document.getElementById("pub-link-url").textContent =
                  pubLinkUrl;

      function renderA11yPanel() {
        const wrap = document.getElementById("a11y-results");
        if (!wrap) return;
        const checks = runA11yAudit();
        wrap.innerHTML = "";

        checks.forEach((ch) => {
          const row = mkEl("div", {
            class:
              "a11y-row" +
              (ch.aa
                ? " a11y-pass"
                : ch.ratio >= 3
                  ? " a11y-warn"
                  : " a11y-fail"),
          });

          const icon = ch.aaa ? "✦" : ch.aa ? "✓" : ch.ratio >= 3 ? "◐" : "✗";
          const badge = mkEl("div", { class: "a11y-badge" }, icon);

          const info = mkEl("div", { class: "a11y-info" });
          const label = mkEl("div", { class: "a11y-label" }, ch.label);

          const meta = mkEl("div", { class: "a11y-meta" });
          const ratioStr = ch.ratio.toFixed(2) + ":1";
          const level = ch.aaa
            ? "AAA ✦"
            : ch.aa
              ? "AA ✓"
              : ch.ratio >= 3
                ? "AA Large ◐"
                : "Fail ✗";
          meta.textContent = `${ratioStr} · ${level}`;

          info.append(label, meta);

          // Color swatches
          const swWrap = mkEl("div", { class: "a11y-swatches" });
          const fgSw = mkEl("div", {
            class: "a11y-color-dot",
            title: "Foreground",
            style: `background:rgb(${ch.fg.r},${ch.fg.g},${ch.fg.b});border:1px solid rgba(255,255,255,0.2)`,
          });
          const sep = mkEl("span", { class: "a11y-on" }, "on");
          const bgSw = mkEl("div", {
            class: "a11y-color-dot",
            title: "Background",
            style: `background:rgb(${ch.bg.r},${ch.bg.g},${ch.bg.b});border:1px solid rgba(255,255,255,0.2)`,
          });
          swWrap.append(fgSw, sep, bgSw);

          row.append(badge, info, swWrap);
          wrap.appendChild(row);
        });

        // Overall score
        const passing = checks.filter((ch) => ch.aa).length;
        const total = checks.length;
        const score = mkEl("div", {
          class:
            "a11y-score" +
            (passing === total ? " a11y-score-pass" : " a11y-score-warn"),
        });
        score.textContent = `${passing}/${total} checks passing AA`;
        wrap.insertBefore(score, wrap.firstChild);
      }

      function setPostMode(mode) {
        state.postMode = mode;
        const ss = document.getElementById("sec-slides");
        if (ss) ss.style.display = mode === "carousel" ? "" : "none";
        const sn = document.getElementById("sec-slidenum");
        if (sn) sn.style.display = mode === "carousel" ? "" : "none";
        ["single", "carousel"].forEach((m) => {
          const b = document.getElementById(`mode-${m}`);
          if (b) b.classList.toggle("on", m === mode);
        });
        const hint = document.getElementById("mode-hint");
        if (hint)
          hint.textContent =
            mode === "carousel"
              ? "Multiple slides — each has its own headline & photo."
              : "Single image — one post, one frame.";
        const lbl = document.getElementById("slide-label");
        if (lbl)
          lbl.textContent =
            mode === "carousel" ? `· Slide ${state.currentSlide + 1}` : "";
        updateSlideNav();
        if (mode === "carousel") renderSlideList();
        redrawFn();
      }
      function renderSlideList() {
        const list = document.getElementById("slide-list");
        if (!list) return;
        list.innerHTML = "";
        state.slides.forEach((s, i) => {
          const row = mkEl("div", {
            class: "slide-row" + (i === state.currentSlide ? " on" : ""),
          });
          row.onclick = () => switchSlide(i);
          const num = mkEl("span", { class: "slide-num-badge" }, i + 1);
          const mini = mkEl("div", { class: "slide-mini" });
          const tc = mkEl("canvas");
          tc.width = 56;
          tc.height = 56;
          const tx = tc.getContext("2d");
          tx.fillStyle = "#111";
          tx.fillRect(0, 0, 56, 56);
          if (s.bgImg) {
            const sc = Math.max(56 / s.bgImg.width, 56 / s.bgImg.height);
            const sw2 = s.bgImg.width * sc,
              sh2 = s.bgImg.height * sc;
            tx.globalAlpha = 0.55;
            tx.drawImage(
              s.bgImg,
              -((sw2 - 56) * s.imgOffsetX),
              -((sh2 - 56) * s.imgOffsetY),
              sw2,
              sh2,
            );
            tx.globalAlpha = 1;
          }
          tx.fillStyle = state.accentColor;
          tx.font = "bold 14px sans-serif";
          tx.textAlign = "center";
          tx.fillText(i + 1, 28, 35);
          mini.appendChild(tc);
          const txt = mkEl(
            "span",
            { class: "slide-txt" },
            s.headline || "(empty slide)",
          );
          const del = mkEl("span", { class: "slide-del" }, "✕");
          del.onclick = (e) => {
            e.stopPropagation();
            removeSlide(i);
          };
          row.append(num, mini, txt, del);
          list.appendChild(row);
        });
      }
      function switchSlide(idx) {
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";

        loadSlideIntoUI();

        updateSlideNav();

      function addSlide() {
        const ta = document.getElementById("txt");

        state.slides.push({
          headline: "",
          subtext: "",
          body: "",
          attribution: "",
          listItems: ["", "", ""],
          bgImg: null,
          imgOffsetX: 0.5,
          imgOffsetY: 0.0,

      function removeSlide(idx) {
        if (state.slides.length <= 1) return;
        state.slides.splice(idx, 1);

          100,
          Math.min(
            4096,
            parseInt(document.getElementById("custom-w")?.value) || 1080,
          ),
        );
        const h = Math.max(
          100,
          Math.min(
            4096,
            parseInt(document.getElementById("custom-h")?.value) || 1080,
          ),
        );
        document.getElementById("custom-w").value = w;
        document.getElementById("custom-h").value = h;
        CANVAS_PRESETS["custom"] = { w, h, label: `${w}×${h} · Custom` };
        const tab = document.getElementById("tab-custom");
        if (tab) tab.style.display = "";
        const expItem = document.querySelector('[data-lbl="Custom"]');
        if (expItem) {
          expItem.style.display = "";
          expItem.dataset.w = w;
          expItem.dataset.h = h;
          expItem.querySelector(".exp-size").textContent = `${w}×${h}`;
        }
        switchPreview("custom", tab || document.getElementById("tab-custom"));
      }

      // Caption generator (standalone)
      function generateCaption() {
        const txt = buildCapText(state.capTone);
        const out = document.getElementById("caption-output");
        if (out) out.style.display = "";
        const box = document.getElementById("caption-text");
        if (box) box.textContent = txt;
        const cb = document.getElementById("copy-btn");
        if (cb) {
          cb.textContent = "📋 Copy";
          cb.classList.remove("copied");
        }
      }
      function copyCaption() {
        const txt = document.getElementById("caption-text")?.textContent || "";
        const btn = document.getElementById("copy-btn");
        fallbackCopy(txt, () => {
          if (btn) {
            btn.textContent = "✅ Copied!";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "📋 Copy";
              btn.classList.remove("copied");
            }, 2000);
          }
        });
      }

      // Prompt generator
      function generateAndShowPrompt() {
        if (!state._selectedTopic) {
          state._selectedTopic = "psychology";
          document.querySelectorAll(".topic-chip")[0]?.classList.add("on");
        }
        const handle = PLATFORM_META[state.platform].handle,
          brand = document.getElementById("brandname")?.value || "Mentel";
        const prompt = generatePrompt(
          state.currentStyle,
          state._selectedTopic,
          handle,
          brand,
        );
        const out = document.getElementById("prompt-output");
        if (out) out.style.display = "flex";
        const box = document.getElementById("prompt-text");
        if (box) box.textContent = prompt;
        const cp = document.getElementById("copy-prompt-btn");
        if (cp) {
          cp.textContent = "📋 Copy Prompt";
          cp.classList.remove("copied");
        }
      }
      function copyPrompt() {
        const txt = document.getElementById("prompt-text")?.textContent || "";
        const btn = document.getElementById("copy-prompt-btn");
        fallbackCopy(txt, () => {
          if (btn) {
            btn.textContent = "✅ Copied!";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "📋 Copy Prompt";
              btn.classList.remove("copied");
            }, 2500);
          }
        });
      }

      // Fallback copy
      function fallbackCopy(txt, cb) {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard
            .writeText(txt)
            .then(cb)
            .catch(() => _fbCopy(txt, cb));
        } else _fbCopy(txt, cb);
      }
      function _fbCopy(txt, cb) {
        const ta = document.createElement("textarea");
        ta.value = txt;
        ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          document.execCommand("copy");
          cb();
        } catch (e) {}
        document.body.removeChild(ta);
      }

      // Presets
      function savePreset() {
        const name =
          document.getElementById("preset-name")?.value?.trim() || "";
        const status = document.getElementById("preset-status");
        if (!name) {
          if (status) status.textContent = "Enter a name first.";
          return;
        }
        const data = {
          name,
          savedAt: new Date().toLocaleDateString(),
          accentColor: state.accentColor,
          textColor: state.textColor,
          bgType: state.bgType,
          gradDir: state.gradDir,
          textAlign: state.textAlign,
          textVPos: state.textVPos,
          currentStyle: state.currentStyle,
          bgSolidColor: document.getElementById("bg-solid-color")?.value,
          bgGradFrom: document.getElementById("bg-grad-from")?.value,
          bgGradTo: document.getElementById("bg-grad-to")?.value,
          darkness: document.getElementById("darkness")?.value,
          typo: { ...state.typo },
          textOffsetY: state.textOffsetY || 0,
          overlay: { ...state.overlay },
        };
        let presets = JSON.parse(lsGet("mentel_presets") || "[]");
        presets.unshift(data);
        if (presets.length > 20) presets = presets.slice(0, 20);
        lsSet("mentel_presets", JSON.stringify(presets));
        const ni = document.getElementById("preset-name");
        if (ni) ni.value = "";
        if (status) {
          status.textContent = `✅ "${name}" saved!`;
          setTimeout(() => (status.textContent = ""), 2500);
        }
        renderPresetList();
      }
      function renderPresetList() {
        const presets = JSON.parse(lsGet("mentel_presets") || "[]");
        const el2 = document.getElementById("preset-list");
        if (!el2) return;
        el2.innerHTML = "";
        if (!presets.length) {
          el2.innerHTML = '<p class="hint">No saved presets yet.</p>';
          return;
        }
        presets.forEach((p, i) => {
          const row = mkEl("div", { class: "preset-item" });
          row.onclick = () => applyPreset(p);
          const dot = mkEl("div", {
            style: `width:10px;height:10px;border-radius:50%;background:${p.accentColor || "#2fbf71"};flex-shrink:0`,
          });
          const nm = mkEl("div", { class: "preset-item-name" }, p.name);
          const dt = mkEl(
            "div",
            { class: "preset-item-date" },
            p.savedAt || "",
          );
          const del = mkEl("span", { class: "preset-item-del" }, "✕");
          del.onclick = (e) => {
            e.stopPropagation();
            let pr = JSON.parse(lsGet("mentel_presets") || "[]");
            pr.splice(i, 1);
            lsSet("mentel_presets", JSON.stringify(pr));
            renderPresetList();
          };
          row.append(dot, nm, dt, del);
          el2.appendChild(row);
        });
      }
      function applyPreset(p) {
        if (p.accentColor) {
          state.accentColor = p.accentColor;
          document.documentElement.style.setProperty("--accent", p.accentColor);
        }
        if (p.textColor) state.textColor = p.textColor;
        if (p.bgType) state.bgType = p.bgType;
        if (p.gradDir) state.gradDir = p.gradDir;
        if (p.textAlign) state.textAlign = p.textAlign;
        if (p.textVPos) state.textVPos = p.textVPos;
        if (p.currentStyle) state.currentStyle = p.currentStyle;
        if (p.fs) {
          const e = document.getElementById("fs");
          if (e) {
            e.value = p.fs;
            const v = document.getElementById("fsval");
            if (v) v.textContent = p.fs;
          }
        }
        if (p.darkness) {
          const e = document.getElementById("darkness");
          if (e) {
            e.value = p.darkness;
            const v = document.getElementById("darkval");
            if (v) v.textContent = p.darkness;
          }
        }
        if (p.bgSolidColor) {
          const e = document.getElementById("bg-solid-color");
          if (e) e.value = p.bgSolidColor;
        }
        if (p.bgGradFrom) {
          const e = document.getElementById("bg-grad-from");
          if (e) e.value = p.bgGradFrom;
        }
        if (p.bgGradTo) {
          const e = document.getElementById("bg-grad-to");
          if (e) e.value = p.bgGradTo;
        }
        renderStyleSwitcher();
        renderControls();
        redrawFn();
        const s = document.getElementById("preset-status");
        if (s) {
          s.textContent = `✅ "${p.name}" loaded!`;
          setTimeout(() => (s.textContent = ""), 2000);
        }
      }

      // Export
      async function exportAll() {
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";
        const selected = [...document.querySelectorAll(".exp-item.on")];
        const status = document.getElementById("statusmsg");
        if (!selected.length) {
          if (status) status.textContent = "Select at least one size.";
          return;
        }
        const btn = document.getElementById("expbtn");
        if (btn) btn.disabled = true;
        const pw = document.getElementById("pw");
        if (pw) pw.style.display = "block";
        const pf = document.getElementById("pf");
        const mimeMap = {
            png: "image/png",
            jpeg: "image/jpeg",
            webp: "image/webp",
          },
          extMap = { png: "png", jpeg: "jpg", webp: "webp" };
        const slidesToExport =
          state.postMode === "carousel" ? state.slides : [getSlide()];
        const total = selected.length * slidesToExport.length;
        let done = 0;
        try {
          for (const item of selected) {
            const W = parseInt(item.dataset.w),
              H = parseInt(item.dataset.h),
              lbl = item.dataset.lbl;
            for (let si = 0; si < slidesToExport.length; si++) {
              const sfx =
                state.postMode === "carousel" ? `_slide${si + 1}` : "";
              if (status)
                status.textContent = `Rendering ${lbl}${sfx}… (${done + 1}/${total})`;
              if (pf) pf.style.width = (done / total) * 85 + "%";
              await new Promise((r) => setTimeout(r, 25));
              const off = document.createElement("canvas");
              drawCard(off, W, H, slidesToExport[si]);
              const dataUrl = off.toDataURL(
                mimeMap[state.fmt],
                state.fmt === "png" ? 1.0 : 0.93,
              );
              const a = document.createElement("a");
              a.href = dataUrl;
              a.download = `mentel_${lbl}${sfx}_${W}x${H}.${extMap[state.fmt]}`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              await new Promise((r) => setTimeout(r, 250));
              done++;
            }
          }
          if (status)
            status.textContent = `✅ ${done} file${done > 1 ? "s" : ""} downloaded!`;
        } catch (err) {
          if (status) status.textContent = "⚠ Export error.";
        } finally {
          if (pf) pf.style.width = "100%";
          setTimeout(() => {
            if (pw) pw.style.display = "none";
            if (pf) pf.style.width = "0%";
          }, 700);
          if (btn) btn.disabled = false;
        }
      }

      // ═══════════════════════════════════════════════════════════════
      // MAIN APP
      // ═══════════════════════════════════════════════════════════════
      window._redraw = redraw;

      let _a11yTimer = null;
      function scheduleA11y() {
        clearTimeout(_a11yTimer);
        _a11yTimer = setTimeout(() => {
          const el = document.getElementById("a11y-results");
          if (el && el.children.length > 0) renderA11yPanel(); // only refresh if panel is open/populated
        }, 400);
      }

      function redraw() {
        const preset = CANVAS_PRESETS[state.currentPreset];
        const canvas = document.getElementById("preview-canvas");
        drawCard(canvas, preset.w, preset.h, getSlide());
        const wrap = document.getElementById("canvas-wrap");
        const avW = wrap.clientWidth - 4,
          avH = wrap.clientHeight - 4;
        const scale = Math.min(avW / preset.w, avH / preset.h);
        canvas.style.width = Math.round(preset.w * scale) + "px";
        canvas.style.height = Math.round(preset.h * scale) + "px";
        document.getElementById("preview-note").textContent =
          preset.label +
          (getSlide().bgImg ? " · Drag to reposition" : " · Live Preview");
        updateSlideNav();
        scheduleA11y();
      }

      window.toggleTheme = () => {
        const html = document.documentElement;
        const dark = html.getAttribute("data-theme") === "dark";
        html.setAttribute("data-theme", dark ? "light" : "dark");
        document.getElementById("theme-icon").textContent = dark ? "☀️" : "🌙";
        document.getElementById("theme-lbl").textContent = dark
          ? "Light"
          : "Dark";
        redraw();
      };
      window.switchPreview = (key, el) => {
        state.currentPreset = key;
        document
          .querySelectorAll(".size-tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        redraw();
      };
      window.navSlide = (dir) => {
        const next = state.currentSlide + dir;
        if (next < 0 || next >= state.slides.length) return;
        state.slides[state.currentSlide].headline =
          document.getElementById("txt")?.value || "";
        state.currentSlide = next;
        loadSlideIntoUI();
        renderSlideList();
        updateSlideNav();
      };

      // Drag to reposition
      let isDragging = false,
        dsx,
        dsy,
        dox,
        doy;
      const cv = document.getElementById("preview-canvas");
      cv.addEventListener("mousedown", (e) => {
        if (!getSlide().bgImg) return;
        isDragging = true;
        dsx = e.clientX;
        dsy = e.clientY;
        dox = getSlide().imgOffsetX;
        doy = getSlide().imgOffsetY;
        cv.classList.add("dragging");
        e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const s = getSlide();
        if (!s.bgImg) return;
        const p = CANVAS_PRESETS[state.currentPreset];
        const scale = Math.max(p.w / s.bgImg.width, p.h / s.bgImg.height);
        const ox = Math.max(0, s.bgImg.width * scale - p.w),
          oy = Math.max(0, s.bgImg.height * scale - p.h);
        const dx = (e.clientX - dsx) * (p.w / cv.offsetWidth),
          dy = (e.clientY - dsy) * (p.h / cv.offsetHeight);
        if (ox > 0) s.imgOffsetX = Math.max(0, Math.min(1, dox - dx / ox));
        if (oy > 0) s.imgOffsetY = Math.max(0, Math.min(1, doy - dy / oy));
        redraw();
      });
      window.addEventListener("mouseup", () => {
        if (isDragging) {
          isDragging = false;
          cv.classList.remove("dragging");
        }
      });
      cv.addEventListener(
        "touchstart",
        (e) => {
          if (!getSlide().bgImg) return;
          const t = e.touches[0];
          isDragging = true;
          dsx = t.clientX;
          dsy = t.clientY;
          dox = getSlide().imgOffsetX;
          doy = getSlide().imgOffsetY;
          e.preventDefault();
        },
        { passive: false },
      );
      window.addEventListener(
        "touchmove",
        (e) => {
          if (!isDragging) return;
          const t = e.touches[0];
          const s = getSlide();
          if (!s.bgImg) return;
          const p = CANVAS_PRESETS[state.currentPreset];
          const scale = Math.max(p.w / s.bgImg.width, p.h / s.bgImg.height);
          const ox = Math.max(0, s.bgImg.width * scale - p.w),
            oy = Math.max(0, s.bgImg.height * scale - p.h);
          const dx = (t.clientX - dsx) * (p.w / cv.offsetWidth),
            dy = (t.clientY - dsy) * (p.h / cv.offsetHeight);
          if (ox > 0) s.imgOffsetX = Math.max(0, Math.min(1, dox - dx / ox));
          if (oy > 0) s.imgOffsetY = Math.max(0, Math.min(1, doy - dy / oy));
          redraw();
          e.preventDefault();
        },
        { passive: false },
      );
      window.addEventListener("touchend", () => {
        isDragging = false;
      });
      document.addEventListener("keydown", (e) => {
        if (state.postMode === "carousel") {
          if (e.key === "ArrowRight") window.navSlide(1);
          if (e.key === "ArrowLeft") window.navSlide(-1);
        }
      });

      // Init
      initSidebar(redraw, renderSlideList);
      renderStyleSwitcher();
      renderStyleIndicator();
      renderControls();
      document.fonts.ready.then(() => redraw());
      window.addEventListener("resize", redraw);
    </script>
  </body>
</html>
